// ── SAV Tab ───────────────────────────────────────────────────────────────────
const SAV_TYPES = ["Onduleur", "Câblage DC", "Câblage AC", "Panneau", "Batterie", "Borne de recharge", "Monitoring", "Autre"];
const SAV_STATUTS = ["Résolu", "En attente de pièce", "Escaladé WGE", "Planifié"];

function makeDefaultSAV() {
  return {
    id: Date.now(),
    date: new Date().toISOString().slice(0, 10),
    intervenant: "",
    type: "Onduleur",
    description: "",
    actionsEffectuees: "",
    statut: "Résolu",
    piecesRemplacees: "",
    photos: { avant: [], apres: [] }
  };
}

function SAVCard({ sav, idx, onChange, onDelete, photos, setPhotos }) {
  var [open, setOpen] = useState(true);

  var statutColors = {
    "Résolu": { bg: "#f0fff4", border: "#27ae60", color: "#27ae60" },
    "En attente de pièce": { bg: "#fff8e1", border: "#f39c12", color: "#856404" },
    "Escaladé WGE": { bg: "#fdecea", border: "#e74c3c", color: "#c0392b" },
    "Planifié": { bg: "#e8f4fd", border: "#3498db", color: "#2980b9" }
  };
  var sc = statutColors[sav.statut] || { bg: "#fafafa", border: BORDER, color: MUTED };
  var photoAvantKey = "sav_avant_" + sav.id;
  var photoApresKey = "sav_apres_" + sav.id;

  function pz(catKey, label) {
    return <PhotoZone catKey={catKey} label={label} items={photos[catKey]||[]} hiRes={true}
      allSections={[{key: photoAvantKey, label:"Avant"},{key: photoApresKey, label:"Après"}]}
      onAdd={function(arr){ setPhotos(catKey, function(p){ return (p||[]).concat(arr); }); }}
      onDelete={function(i){ if(!window.confirm("Supprimer ?")) return;
        setPhotos(catKey, function(p){ return (p||[]).filter(function(_,j){ return j!==i; }); }); }}
      onUpdate={function(i,u){ setPhotos(catKey, function(p){ var a=[].concat(p||[]); a[i]=u; return a; }); }}
      onReorder={function(f,t){ setPhotos(catKey, function(p){ var a=[].concat(p||[]); var it=a.splice(f,1)[0]; a.splice(t,0,it); return a; }); }}
      onReceiveCross={function(fk,fi){ var src=(photos[fk]||[])[fi]; if(!src) return;
        setPhotos(catKey,function(p){ return (p||[]).concat([src]); });
        setPhotos(fk,function(p){ return (p||[]).filter(function(_,j){ return j!==fi; }); }); }}
      onMoveTo={function(fi,tk){ var src=(photos[catKey]||[])[fi]; if(!src) return;
        setPhotos(tk,function(p){ return (p||[]).concat([src]); });
        setPhotos(catKey,function(p){ return (p||[]).filter(function(_,j){ return j!==fi; }); }); }}
    />;
  }

  return (
    <div style={{ border: "1.5px solid " + sc.border, borderRadius: 10,
      overflow: "hidden", marginBottom: 14 }}>
      {/* Header */}
      <div onClick={function(){ setOpen(function(o){ return !o; }); }}
        style={{ background: sc.bg, padding: "11px 14px", cursor: "pointer",
          display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
        <span style={{ fontWeight: 700, fontSize: 13, color: sc.color }}>
          🔧 Intervention {idx + 1}
        </span>
        <span style={{ fontSize: 12, color: MUTED }}>
          {sav.date || "Sans date"}
          {sav.intervenant && " — " + sav.intervenant}
        </span>
        <span style={{ fontSize: 11, fontWeight: 700, background: sc.border,
          color: WHITE, borderRadius: 5, padding: "1px 8px", marginLeft: "auto" }}>
          {sav.statut}
        </span>
        <span style={{ fontSize: 11, background: "#e8e8e4", borderRadius: 5,
          padding: "1px 8px", color: MUTED }}>
          {sav.type}
        </span>
        <span style={{ color: MUTED, fontSize: 12 }}>{open ? "▲" : "▼"}</span>
      </div>

      {open && (
        <div style={{ padding: "14px", background: WHITE }}>
          {/* Row 1: date + intervenant + type */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 10, marginBottom: 12 }}>
            <div>
              <label style={{ fontSize: 12, color: MUTED, fontWeight: 500, marginBottom: 4, display: "block" }}>Date</label>
              <input type="date" value={sav.date||""} onChange={function(e){ onChange({...sav, date: e.target.value}); }} />
            </div>
            <div>
              <label style={{ fontSize: 12, color: MUTED, fontWeight: 500, marginBottom: 4, display: "block" }}>Intervenant</label>
              <input type="text" value={sav.intervenant||""} onChange={function(e){ onChange({...sav, intervenant: e.target.value}); }} placeholder="Nom ou société" />
            </div>
            <div>
              <label style={{ fontSize: 12, color: MUTED, fontWeight: 500, marginBottom: 4, display: "block" }}>Type de problème</label>
              <select value={sav.type||"Onduleur"} onChange={function(e){ onChange({...sav, type: e.target.value}); }}>
                {SAV_TYPES.map(function(t){ return <option key={t} value={t}>{t}</option>; })}
              </select>
            </div>
            <div>
              <label style={{ fontSize: 12, color: MUTED, fontWeight: 500, marginBottom: 4, display: "block" }}>Statut</label>
              <select value={sav.statut||"Résolu"} onChange={function(e){ onChange({...sav, statut: e.target.value}); }}>
                {SAV_STATUTS.map(function(s){ return <option key={s} value={s}>{s}</option>; })}
              </select>
            </div>
          </div>

          {/* Description */}
          <div style={{ marginBottom: 10 }}>
            <label style={{ fontSize: 12, color: MUTED, fontWeight: 500, marginBottom: 4, display: "block" }}>Description du problème</label>
            <textarea value={sav.description||""} onChange={function(e){ onChange({...sav, description: e.target.value}); }}
              placeholder="Décrire le problème observé…"
              rows={3} style={{ width: "100%", fontSize: 13, resize: "vertical", boxSizing: "border-box" }} />
          </div>

          {/* Actions */}
          <div style={{ marginBottom: 10 }}>
            <label style={{ fontSize: 12, color: MUTED, fontWeight: 500, marginBottom: 4, display: "block" }}>Actions effectuées</label>
            <textarea value={sav.actionsEffectuees||""} onChange={function(e){ onChange({...sav, actionsEffectuees: e.target.value}); }}
              placeholder="Décrire les actions réalisées pour résoudre le problème…"
              rows={3} style={{ width: "100%", fontSize: 13, resize: "vertical", boxSizing: "border-box" }} />
          </div>

          {/* Pièces */}
          <div style={{ marginBottom: 14 }}>
            <label style={{ fontSize: 12, color: MUTED, fontWeight: 500, marginBottom: 4, display: "block" }}>Pièces remplacées</label>
            <input type="text" value={sav.piecesRemplacees||""}
              onChange={function(e){ onChange({...sav, piecesRemplacees: e.target.value}); }}
              placeholder="ex: Onduleur Fronius Primo 6.0 — réf. 12345" />
          </div>

          {/* Photos */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
            <div>{pz(photoAvantKey, "📷 Photos AVANT")}</div>
            <div>{pz(photoApresKey, "📷 Photos APRÈS")}</div>
          </div>

          {/* Delete */}
          <div style={{ textAlign: "right" }}>
            <button onClick={function(){
              if (!window.confirm("Supprimer cette intervention ?")) return;
              onDelete();
            }} style={{ background: "#fdecea", border: "1px solid #f1948a",
              color: "#c0392b", borderRadius: 7, padding: "6px 14px",
              fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
              🗑 Supprimer l'intervention
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── AdminTab ───────────────────────────────────────────────────────────────────
var ADMIN_SECTIONS_DEF = [
  { key: "rgie",      label: "📋 Rapport de conformité RGIE",  color: "#8e44ad" },
  { key: "asbuilt",   label: "📐 Dossiers AS-Built",           color: "#2980b9" },
  { key: "grd",       label: "🔌 Documents GRD",               color: "#16a085" },
  { key: "stabilite", label: "🏗️ Rapport de stabilité",       color: "#c0392b" },
  { key: "fiches",    label: "📄 Fiches techniques",           color: "#e67e22" },
];

var CUSTOM_SECTION_COLORS = ["#e67e22","#1abc9c","#3498db","#e91e63","#607d8b","#795548","#ff5722","#9c27b0"];
var FILE_ICONS = { pdf:"📄", xlsx:"📊", xls:"📊", dwg:"📐", dxf:"📐", docx:"📝", doc:"📝", png:"🖼️", jpg:"🖼️", jpeg:"🖼️", default:"📎" };
function fileIcon(name) { var ext = (name||"").split(".").pop().toLowerCase(); return FILE_ICONS[ext] || FILE_ICONS.default; }
function fmtSize(bytes) { if (!bytes) return ""; if (bytes < 1024) return bytes + " o"; if (bytes < 1048576) return (bytes/1024).toFixed(0) + " Ko"; return (bytes/1048576).toFixed(1) + " Mo"; }

// ── Single document section (extracted to avoid hooks-inside-map issue) ──────
function AdminSection({ secDef, sec, isUp, editNote, noteVal, setNoteVal,
    onFiles, onRemoveDoc, onSaveNote, onEditNote, onSectionNoteChange, onDeleteSection }) {
  var [dragOver, setDragOver] = React.useState(false);
  var fileInputRef = React.useRef();
  var docs = (sec && sec.docs) || [];

  return (
    <div style={{ background: WHITE, border: "1px solid " + (dragOver ? secDef.color : BORDER),
      borderRadius: 10, marginBottom: 10, overflow: "hidden",
      boxShadow: dragOver ? "0 0 0 3px " + secDef.color + "33" : "none",
      transition: "border-color 0.15s, box-shadow 0.15s" }}>

      {/* Header */}
      <div style={{ background: secDef.color + "12", borderBottom: "1px solid " + secDef.color + "33",
        padding: "10px 14px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div style={{ fontWeight: 700, fontSize: 12, color: secDef.color, display: "flex", alignItems: "center", gap: 6 }}>
          {secDef.label}
          {docs.length > 0 && <span style={{ background: secDef.color + "22", borderRadius: 10, padding: "1px 8px", fontSize: 11 }}>{docs.length}</span>}
        </div>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          {onDeleteSection && (
            <button onClick={onDeleteSection} title="Supprimer cette section"
              style={{ background: "none", border: "none", color: "#bbb", cursor: "pointer",
                fontSize: 15, padding: "2px 6px", lineHeight: 1 }}>✕</button>
          )}
          <button onClick={function(){ fileInputRef.current && fileInputRef.current.click(); }}
            style={{ background: secDef.color, color: WHITE, border: "none", borderRadius: 7,
              padding: "5px 12px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
            {isUp ? "⏳" : "➕ Ajouter"}
          </button>
        </div>
      </div>

      <input ref={fileInputRef} type="file" multiple
        accept=".pdf,.xlsx,.xls,.csv,.dwg,.dxf,.docx,.doc,.png,.jpg,.jpeg,.gif,.svg,.zip,.rar"
        style={{ display: "none" }}
        onChange={function(e){ if(e.target.files&&e.target.files.length) onFiles(Array.from(e.target.files)); e.target.value=""; }} />

      {/* Drop zone */}
      <div
        onDragOver={function(e){ e.preventDefault(); setDragOver(true); }}
        onDragEnter={function(e){ e.preventDefault(); setDragOver(true); }}
        onDragLeave={function(e){ if (!e.currentTarget.contains(e.relatedTarget)) setDragOver(false); }}
        onDrop={function(e){ e.preventDefault(); setDragOver(false); var ff=Array.from(e.dataTransfer.files||[]); if(ff.length) onFiles(ff); }}
        style={{ padding: "10px 14px", background: dragOver ? secDef.color + "08" : "transparent", transition: "background 0.15s", minHeight: docs.length === 0 ? 72 : "auto" }}>

        {docs.length === 0 && (
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
            padding: "10px 0", color: dragOver ? secDef.color : "#ccc", fontSize: 12,
            fontWeight: dragOver ? 700 : 400, gap: 4, pointerEvents: "none", userSelect: "none" }}>
            <span style={{ fontSize: 26 }}>{dragOver ? "⬇️" : "📂"}</span>
            {dragOver ? "Déposez vos fichiers ici" : "Glissez-déposez ou cliquez « Ajouter »"}
          </div>
        )}

        {docs.map(function(doc, di) {
          var isEditingNote = editNote && editNote.sKey === secDef.key && editNote.docIdx === di;
          return (
            <div key={doc.id || di} style={{ display: "flex", alignItems: "flex-start", gap: 10,
              padding: "8px 0", borderBottom: di < docs.length-1 ? "1px solid #f0f0ec" : "none" }}>
              <div style={{ fontSize: 22, flexShrink: 0, lineHeight: 1.3 }}>{fileIcon(doc.name)}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13, fontWeight: 600, wordBreak: "break-word" }}>{doc.name}</div>
                <div style={{ fontSize: 11, color: MUTED, marginTop: 2 }}>
                  {fmtSize(doc.size)}{doc.uploadedBy && " · 👤 " + doc.uploadedBy}
                  {doc.addedAt && " · " + new Date(doc.addedAt).toLocaleDateString("fr-BE", { day:"2-digit", month:"2-digit", year:"numeric" })}
                </div>
                {isEditingNote ? (
                  <div style={{ marginTop: 6 }}>
                    <input type="text" value={noteVal} onChange={function(e){ setNoteVal(e.target.value); }}
                      placeholder="Note sur ce document…" style={{ width: "100%", fontSize: 12 }}
                      onKeyDown={function(e){ if(e.key==="Enter") onSaveNote(secDef.key, di); if(e.key==="Escape") onEditNote(null); }}
                      autoFocus />
                    <div style={{ display: "flex", gap: 6, marginTop: 4 }}>
                      <button onClick={function(){ onSaveNote(secDef.key, di); }}
                        style={{ background: GREEN, color: WHITE, border: "none", borderRadius: 5, padding: "3px 10px", fontSize: 12, cursor: "pointer" }}>✓</button>
                      <button onClick={function(){ onEditNote(null); }}
                        style={{ background: BORDER, color: MUTED, border: "none", borderRadius: 5, padding: "3px 10px", fontSize: 12, cursor: "pointer" }}>✕</button>
                    </div>
                  </div>
                ) : doc.note ? (
                  <div onClick={function(){ onEditNote({sKey:secDef.key,docIdx:di}); setNoteVal(doc.note); }}
                    style={{ marginTop: 4, fontSize: 12, color: "#555", background: "#f8f8f6", borderRadius: 5,
                      padding: "4px 8px", cursor: "pointer", borderLeft: "2px solid " + secDef.color }}>
                    📝 {doc.note}
                  </div>
                ) : (
                  <button onClick={function(){ onEditNote({sKey:secDef.key,docIdx:di}); setNoteVal(""); }}
                    style={{ marginTop: 4, background: "none", border: "none", color: MUTED, fontSize: 11,
                      cursor: "pointer", padding: 0, textDecoration: "underline" }}>+ Ajouter une note</button>
                )}
              </div>
              <div style={{ display: "flex", gap: 5, flexShrink: 0, alignItems: "center" }}>
                {doc.url && (
                  <a href={doc.url} download={doc.name} target="_blank"
                    style={{ background: "#e8f4fd", border: "1px solid #aed6f1", color: "#2980b9",
                      borderRadius: 5, padding: "4px 9px", fontSize: 12, textDecoration: "none", fontWeight: 600 }}>⬇</a>
                )}
                <button onClick={function(){ onRemoveDoc(secDef.key, doc.id||String(di)); }}
                  style={{ background: "#fdecea", border: "1px solid #f1948a", color: "#c0392b",
                    borderRadius: 5, padding: "4px 8px", fontSize: 12, cursor: "pointer", minHeight: 0 }}>🗑</button>
              </div>
            </div>
          );
        })}
        {docs.length > 0 && dragOver && (
          <div style={{ textAlign: "center", padding: "8px 0", color: secDef.color, fontWeight: 700, fontSize: 12 }}>⬇️ Déposez pour ajouter</div>
        )}
      </div>

      {/* Section note */}
      <div style={{ padding: "0 14px 10px" }}>
        <textarea value={(sec && sec.note) || ""}
          onChange={function(e){ onSectionNoteChange(secDef.key, e.target.value); }}
          placeholder={"Note sur " + secDef.label.replace(/^[^\s]+\s/,"")} rows={2}
          style={{ width: "100%", resize: "vertical", fontSize: 12, color: "#444" }} />
      </div>
    </div>
  );
}

function AdminTab({ data, setData }) {
  var admin = data.admin || { rgieConformite: "", notes: "", sections: {}, customSections: [] };
  var [uploading, setUploading] = useState({});
  var [editNote, setEditNote] = useState(null);
  var [noteVal, setNoteVal] = useState("");
  var [newSectionName, setNewSectionName] = useState("");
  var [newSectionColor, setNewSectionColor] = useState(CUSTOM_SECTION_COLORS[0]);
  var [addingSection, setAddingSection] = useState(false);

  function setAdmin(updater) {
    setData(function(prev) {
      var a = typeof updater === "function" ? updater(prev.admin || {}) : updater;
      return Object.assign({}, prev, { admin: a });
    });
  }
  function setSection(sKey, updater) {
    setAdmin(function(a) {
      var sections = Object.assign({}, a.sections || {});
      sections[sKey] = typeof updater === "function" ? updater(sections[sKey] || { docs: [], note: "" }) : updater;
      return Object.assign({}, a, { sections: sections });
    });
  }
  function getSection(sKey) { return ((admin.sections||{})[sKey]) || { docs: [], note: "" }; }

  var customSections = admin.customSections || [];
  var conformite = admin.rgieConformite || "";

  async function handleFiles(sKey, files) {
    setUploading(function(u){ return Object.assign({}, u, { [sKey]: true }); });
    var uploaderName = (window._wgeCurrentUser && window._wgeCurrentUser.name) || (function(){ try { return JSON.parse(localStorage.getItem("wge_user")||"{}").name||""; } catch(e) { return ""; } })();
    var added = [];
    for (var i = 0; i < files.length; i++) {
      var f = files[i];
      var dataUrl = await new Promise(function(res) {
        var r = new FileReader(); r.onload = function(e){ res(e.target.result); }; r.readAsDataURL(f);
      });
      added.push({ id: Date.now().toString(36) + Math.random().toString(36).slice(2,5),
        name: f.name, type: f.type, size: f.size, url: dataUrl,
        note: "", addedAt: new Date().toISOString(), uploadedBy: uploaderName });
    }
    setSection(sKey, function(s){ return Object.assign({}, s, { docs: (s.docs||[]).concat(added) }); });
    setUploading(function(u){ var n=Object.assign({},u); delete n[sKey]; return n; });
  }
  function removeDoc(sKey, docId) {
    if (!window.confirm("Supprimer ce document ?")) return;
    setSection(sKey, function(s){ return Object.assign({}, s, { docs: (s.docs||[]).filter(function(d){ return d.id !== docId; }) }); });
  }
  function saveDocNote(sKey, docIdx) {
    setSection(sKey, function(s){
      var docs = (s.docs||[]).slice(); docs[docIdx] = Object.assign({}, docs[docIdx], { note: noteVal });
      return Object.assign({}, s, { docs: docs });
    });
    setEditNote(null);
  }
  function setSectionNote(sKey, val) {
    setSection(sKey, function(s){ return Object.assign({}, s, { note: val }); });
  }
  function addCustomSection() {
    var name = newSectionName.trim(); if (!name) return;
    var key = "custom_" + Date.now().toString(36);
    setAdmin(function(a){ return Object.assign({}, a, {
      customSections: (a.customSections||[]).concat([{ key: key, label: name, color: newSectionColor }])
    }); });
    setNewSectionName(""); setAddingSection(false);
  }
  function deleteCustomSection(key) {
    if (!window.confirm("Supprimer cette section et tous ses documents ?")) return;
    setAdmin(function(a){
      var cs = (a.customSections||[]).filter(function(s){ return s.key !== key; });
      var sections = Object.assign({}, a.sections||{}); delete sections[key];
      return Object.assign({}, a, { customSections: cs, sections: sections });
    });
  }

  var allSections = ADMIN_SECTIONS_DEF.concat(customSections);

  return (
    <div style={{ paddingBottom: 40 }}>

      {/* ── RGIE Conformité ── */}
      <div style={{ background: WHITE, border: "1px solid " + BORDER, borderRadius: 10, padding: "14px 16px", marginBottom: 14 }}>
        <div style={{ fontWeight: 700, fontSize: 13, color: "#8e44ad", marginBottom: 10, display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 18 }}>⚡</span> Statut RGIE
        </div>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          {[["conforme","✅ Conforme","#27ae60","#eafaf1"],["non_conforme","❌ Non conforme","#e74c3c","#fdecea"],["en_attente","⏳ En attente","#f39c12","#fff8e8"]].map(function(opt) {
            var isActive = conformite === opt[0];
            return (
              <button key={opt[0]} onClick={function(){ setAdmin(function(a){ return Object.assign({},a,{rgieConformite: isActive?"":opt[0]}); }); }}
                style={{ padding: "9px 18px", borderRadius: 8, border: "2px solid " + (isActive ? opt[2] : BORDER),
                  background: isActive ? opt[3] : WHITE, color: isActive ? opt[2] : MUTED,
                  fontWeight: isActive ? 700 : 400, fontSize: 13, cursor: "pointer" }}>
                {opt[1]}
              </button>
            );
          })}
        </div>
        {conformite === "non_conforme" && (
          <div style={{ marginTop: 10, padding: "8px 11px", background: "#fdecea", borderRadius: 7, fontSize: 12, color: "#c0392b", border: "1px solid #f1948a" }}>
            ⚠️ Non-conformité RGIE — assurez-vous de joindre le rapport et les documents GRD correspondants.
          </div>
        )}
      </div>

      {/* ── Toutes les sections (fixes + custom) ── */}
      {allSections.map(function(secDef) {
        var isCustom = !!secDef.key.startsWith("custom_");
        return (
          <AdminSection key={secDef.key}
            secDef={secDef}
            sec={getSection(secDef.key)}
            isUp={!!uploading[secDef.key]}
            editNote={editNote}
            noteVal={noteVal}
            setNoteVal={setNoteVal}
            onFiles={function(files){ handleFiles(secDef.key, files); }}
            onRemoveDoc={removeDoc}
            onSaveNote={saveDocNote}
            onEditNote={setEditNote}
            onSectionNoteChange={setSectionNote}
            onDeleteSection={isCustom ? function(){ deleteCustomSection(secDef.key); } : null}
          />
        );
      })}

      {/* ── Ajouter une section personnalisée ── */}
      <div style={{ background: WHITE, border: "2px dashed " + BORDER, borderRadius: 10, marginBottom: 14 }}>
        {!addingSection ? (
          <button onClick={function(){ setAddingSection(true); }}
            style={{ width: "100%", padding: "13px", background: "none", border: "none",
              color: MUTED, fontSize: 13, cursor: "pointer", display: "flex", alignItems: "center",
              justifyContent: "center", gap: 8, fontFamily: "inherit" }}>
            <span style={{ fontSize: 18 }}>➕</span>
            Ajouter un type de document libre
          </button>
        ) : (
          <div style={{ padding: "14px 16px" }}>
            <div style={{ fontWeight: 700, fontSize: 12, color: MUTED, marginBottom: 10, textTransform: "uppercase", letterSpacing: "0.06em" }}>
              Nouvelle section
            </div>
            <input type="text" value={newSectionName} onChange={function(e){ setNewSectionName(e.target.value); }}
              placeholder="Ex: Permis d'urbanisme, Contrat EDF, Attestation TVA…"
              style={{ width: "100%", marginBottom: 10, fontSize: 13 }}
              onKeyDown={function(e){ if(e.key==="Enter") addCustomSection(); if(e.key==="Escape") setAddingSection(false); }}
              autoFocus />
            <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 11, color: MUTED, marginBottom: 6 }}>Couleur</div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {CUSTOM_SECTION_COLORS.map(function(c) {
                  return (
                    <button key={c} onClick={function(){ setNewSectionColor(c); }}
                      style={{ width: 28, height: 28, borderRadius: "50%", background: c,
                        border: newSectionColor === c ? "3px solid #333" : "2px solid #e8e8e4",
                        cursor: "pointer", padding: 0, minHeight: 0, flexShrink: 0 }} />
                  );
                })}
              </div>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={addCustomSection}
                style={{ background: newSectionColor, color: WHITE, border: "none", borderRadius: 8,
                  padding: "9px 20px", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
                ✓ Créer
              </button>
              <button onClick={function(){ setAddingSection(false); setNewSectionName(""); }}
                style={{ background: "none", border: "1px solid " + BORDER, borderRadius: 8,
                  padding: "9px 14px", fontSize: 13, color: MUTED, cursor: "pointer" }}>Annuler</button>
            </div>
          </div>
        )}
      </div>

      {/* ── Notes générales ── */}
      <div style={{ background: WHITE, border: "1px solid " + BORDER, borderRadius: 10, padding: "12px 14px" }}>
        <div style={{ fontWeight: 700, fontSize: 12, color: MUTED, textTransform: "uppercase", letterSpacing: "0.07em", marginBottom: 8 }}>📝 Notes administratives générales</div>
        <textarea value={admin.notes || ""} onChange={function(e){ setAdmin(function(a){ return Object.assign({},a,{notes:e.target.value}); }); }}
          placeholder="Remarques générales, points administratifs en suspens, contacts GRD, dossier UREC…"
          rows={5} style={{ width: "100%", resize: "vertical", fontSize: 13 }} />
      </div>
    </div>
  );
}

function SAVTab({ data, setData }) {
  var savList = data.sav || [];
  var savPhotos = data.savPhotos || {};

  function setSavList(updater) {
    setData(function(prev){ var n=Object.assign({},prev);
      n.sav = typeof updater === "function" ? updater(prev.sav||[]) : updater;
      return n;
    });
  }
  function setSavPhotos(catKey, updater) {
    setData(function(prev){ var n=Object.assign({},prev);
      n.savPhotos = Object.assign({}, prev.savPhotos||{});
      n.savPhotos[catKey] = typeof updater === "function" ? updater((prev.savPhotos||{})[catKey]||[]) : updater;
      return n;
    });
  }

  // Summary stats
  var total = savList.length;
  var resolus = savList.filter(function(s){ return s.statut === "Résolu"; }).length;
  var enAttente = savList.filter(function(s){ return s.statut !== "Résolu"; }).length;

  return (
    <div>
      {/* Stats header */}
      {total > 0 && (
        <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
          <div style={{ flex: 1, minWidth: 100, background: "#f0fff4", border: "1px solid #a8e6c0",
            borderRadius: 9, padding: "10px 14px", textAlign: "center" }}>
            <div style={{ fontSize: 22, fontWeight: 800, color: "#27ae60" }}>{resolus}</div>
            <div style={{ fontSize: 11, color: MUTED }}>Résolus</div>
          </div>
          <div style={{ flex: 1, minWidth: 100, background: "#fff8e1", border: "1px solid #ffe082",
            borderRadius: 9, padding: "10px 14px", textAlign: "center" }}>
            <div style={{ fontSize: 22, fontWeight: 800, color: "#856404" }}>{enAttente}</div>
            <div style={{ fontSize: 11, color: MUTED }}>En cours</div>
          </div>
          <div style={{ flex: 1, minWidth: 100, background: WHITE, border: "1px solid " + BORDER,
            borderRadius: 9, padding: "10px 14px", textAlign: "center" }}>
            <div style={{ fontSize: 22, fontWeight: 800, color: "#1a1a1a" }}>{total}</div>
            <div style={{ fontSize: 11, color: MUTED }}>Total</div>
          </div>
        </div>
      )}

      {/* Empty state */}
      {total === 0 && (
        <div style={{ textAlign: "center", padding: "40px 20px", color: MUTED,
          background: "#fafaf8", borderRadius: 10, border: "1.5px dashed " + BORDER, marginBottom: 16 }}>
          <div style={{ fontSize: 32, marginBottom: 8 }}>🔧</div>
          <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 4 }}>Aucune intervention SAV</div>
          <div style={{ fontSize: 12 }}>Cliquez sur le bouton ci-dessous pour enregistrer une intervention</div>
        </div>
      )}

      {/* SAV cards */}
      {savList.map(function(sav, i) {
        return (
          <SAVCard key={sav.id || i} sav={sav} idx={i}
            onChange={function(updated){ setSavList(function(l){ return l.map(function(s,j){ return j===i?updated:s; }); }); }}
            onDelete={function(){ setSavList(function(l){ return l.filter(function(_,j){ return j!==i; }); }); }}
            photos={savPhotos} setPhotos={setSavPhotos}
          />
        );
      })}

      {/* Add button */}
      <button onClick={function(){ setSavList(function(l){ return l.concat([makeDefaultSAV()]); }); }}
        style={{ width: "100%", padding: "12px", border: "2px dashed #f39c12",
          background: "#fffdf0", color: "#856404", borderRadius: 9,
          fontSize: 14, fontWeight: 700, cursor: "pointer",
          display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
        + Nouvelle intervention SAV
      </button>
      <WhatsAppNotify data={data} tab="sav" dcComp={null} acComp={null} />
    </div>
  );
}

// ── Maintenance Tab — stocké dans data.maintenanceVisites (comme SAV) ─────────
function makeDefaultVisite() {
  return {
    id: Date.now(),
    date: new Date().toISOString().slice(0, 10),
    responsable: "",
    onduleurs: [mkOnd(0)],
    photosGenerales: []
  };
}

function MaintenanceTab({ data, setData }) {
  var maintList = data.maintenanceVisites || [];
  var [currentIdx, setCurrentIdx] = useState(null);
  var [photoState, setPhotoState] = useState({});

  function setMaintList(updater) {
    setData(function(prev) {
      return Object.assign({}, prev, {
        maintenanceVisites: typeof updater === "function"
          ? updater(prev.maintenanceVisites || [])
          : updater
      });
    });
  }

  function addVisite() {
    var newVisite = makeDefaultVisite();
    setMaintList(function(l) { return l.concat([newVisite]); });
    setCurrentIdx((maintList.length)); // open it immediately
  }

  function updateVisite(idx, updated) {
    setMaintList(function(l) {
      return l.map(function(v, i) { return i === idx ? updated : v; });
    });
  }

  function deleteVisite(idx) {
    setMaintList(function(l) { return l.filter(function(_, i) { return i !== idx; }); });
    if (currentIdx === idx) setCurrentIdx(null);
    else if (currentIdx > idx) setCurrentIdx(currentIdx - 1);
  }

  function fmtDate(iso) {
    if (!iso) return "—";
    return new Date(iso).toLocaleDateString("fr-BE", { day:"2-digit", month:"2-digit", year:"numeric" });
  }

  // ── List view ──────────────────────────────────────────────────────────────
  if (currentIdx === null) {
    return (
      <div>
        {maintList.length === 0 && (
          <div style={{ textAlign:"center", padding:"40px 20px", color:MUTED,
            background:"#fafaf8", borderRadius:10, border:"1.5px dashed "+BORDER, marginBottom:16 }}>
            <div style={{ fontSize:32, marginBottom:8 }}>🔩</div>
            <div style={{ fontWeight:600, fontSize:14, marginBottom:4 }}>Aucune visite de maintenance</div>
            <div style={{ fontSize:12 }}>Créez la première visite avec le bouton ci-dessous</div>
          </div>
        )}

        {maintList.map(function(visite, i) {
          var onds = visite.onduleurs || [];
          var ok  = onds.filter(function(o) { return o.etat === "OK"; }).length;
          var err = onds.filter(function(o) { return o.etat === "Erreur"; }).length;
          return (
            <div key={visite.id || i} onClick={function() { setCurrentIdx(i); }}
              style={{ background:WHITE, border:"1px solid "+BORDER, borderRadius:9,
                padding:"12px 14px", marginBottom:8, cursor:"pointer",
                display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontWeight:700, fontSize:14 }}>
                  🔩 Visite {i + 1}
                </div>
                <div style={{ fontSize:11, color:MUTED, marginTop:3 }}>
                  {fmtDate(visite.date)}
                  {visite.responsable && " — " + visite.responsable}
                  {" — " + onds.length + " onduleur(s)"}
                </div>
              </div>
              <div style={{ display:"flex", gap:6 }}>
                {ok > 0 && <span style={{ background:"#f0fff4", border:"1px solid #a8e6c0",
                  color:"#27ae60", borderRadius:5, padding:"2px 8px", fontSize:11, fontWeight:600 }}>
                  {ok} OK
                </span>}
                {err > 0 && <span style={{ background:"#fdecea", border:"1px solid #f1948a",
                  color:"#c0392b", borderRadius:5, padding:"2px 8px", fontSize:11, fontWeight:600 }}>
                  {err} ⚠️
                </span>}
              </div>
              <button onClick={function(e) {
                e.stopPropagation();
                if (!window.confirm("Supprimer cette visite ?")) return;
                deleteVisite(i);
              }} style={{ background:"#fdecea", border:"none", color:"#c0392b",
                borderRadius:6, padding:"5px 10px", fontSize:12, cursor:"pointer", minHeight:0 }}>
                🗑
              </button>
              <span style={{ color:MUTED, fontSize:14 }}>›</span>
            </div>
          );
        })}

        <button onClick={addVisite}
          style={{ width:"100%", padding:"12px", border:"2px dashed "+GREEN_MID,
            background:GREEN_LIGHT, color:GREEN, borderRadius:9,
            fontSize:14, fontWeight:700, cursor:"pointer",
            display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
          + Nouvelle visite de maintenance
        </button>
        <WhatsAppNotify data={data} tab="maintenance" dcComp={null} acComp={null} />
      </div>
    );
  }

  // ── Detail view ────────────────────────────────────────────────────────────
  var visite = maintList[currentIdx];
  if (!visite) { setCurrentIdx(null); return null; }

  var onds = visite.onduleurs || [mkOnd(0)];

  function updateOnd(i, updated) {
    updateVisite(currentIdx, Object.assign({}, visite, {
      onduleurs: onds.map(function(o, j) { return j === i ? updated : o; })
    }));
  }

  function setVisitePhotos(catKey, updater) {
    var current = (visite.photos || {})[catKey] || [];
    var updated2 = typeof updater === "function" ? updater(current) : updater;
    updateVisite(currentIdx, Object.assign({}, visite, {
      photos: Object.assign({}, visite.photos || {}, { [catKey]: updated2 })
    }));
  }

  var visitePhotos = visite.photos || {};

  return (
    <div>
      {/* Back header */}
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14,
        padding:"10px 14px", background:GREEN_LIGHT, borderRadius:9, border:"1px solid "+GREEN_MID }}>
        <button onClick={function() { setCurrentIdx(null); }}
          style={{ background:GREEN, color:WHITE, border:"none", borderRadius:7,
            padding:"7px 14px", fontSize:13, fontWeight:600, cursor:"pointer" }}>
          ← Retour
        </button>
        <div style={{ flex:1, fontWeight:700, fontSize:13, color:GREEN }}>
          🔩 Visite {currentIdx + 1}
          {visite.date && <span style={{ fontWeight:400, color:MUTED, marginLeft:8 }}>{fmtDate(visite.date)}</span>}
        </div>
      </div>

      {/* Meta */}
      <div style={{ background:WHITE, border:"1px solid "+BORDER, borderRadius:9,
        padding:"12px 14px", marginBottom:14 }}>
        <div style={{ fontWeight:700, fontSize:11, color:GREEN, textTransform:"uppercase",
          letterSpacing:"0.07em", marginBottom:10 }}>Identification</div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(180px,1fr))", gap:10 }}>
          <div>
            <label style={{ fontSize:12, color:MUTED, fontWeight:500, marginBottom:4, display:"block" }}>Date</label>
            <input type="date" value={visite.date||""}
              onChange={function(e){ updateVisite(currentIdx, Object.assign({},visite,{date:e.target.value})); }} />
          </div>
          <div>
            <label style={{ fontSize:12, color:MUTED, fontWeight:500, marginBottom:4, display:"block" }}>Responsable</label>
            <input type="text" value={visite.responsable||""}
              onChange={function(e){ updateVisite(currentIdx, Object.assign({},visite,{responsable:e.target.value})); }}
              placeholder="Nom de l'intervenant" />
          </div>
        </div>
      </div>

      {/* Onduleurs */}
      {onds.map(function(ond, i) {
        return <MaintOnduleurCard key={ond.id||i} idx={i} ond={ond}
          onChange={function(u){ updateOnd(i, u); }}
          onDelete={onds.length > 1 ? function(){
            updateVisite(currentIdx, Object.assign({}, visite, {
              onduleurs: onds.filter(function(_, j){ return j !== i; })
            }));
          } : null}
        />;
      })}

      <button onClick={function(){
        updateVisite(currentIdx, Object.assign({}, visite, {
          onduleurs: onds.concat([mkOnd(onds.length)])
        }));
      }} style={{ width:"100%", padding:"10px", border:"2px dashed "+GREEN_MID,
        background:GREEN_LIGHT, color:GREEN, borderRadius:8,
        fontSize:13, fontWeight:600, cursor:"pointer", marginBottom:14 }}>
        + Ajouter un onduleur
      </button>

      {/* General photos */}
      <div style={{ background:WHITE, border:"1px solid "+BORDER, borderRadius:9, padding:"12px 14px" }}>
        <div style={{ fontWeight:700, fontSize:11, color:GREEN, textTransform:"uppercase",
          letterSpacing:"0.07em", marginBottom:10 }}>Photos générales</div>
        <PhotoZone catKey={"maint_ph_"+visite.id} label="📷 Photos de l'installation"
          items={visitePhotos["general"]||[]} hiRes={true} allSections={[]}
          onAdd={function(arr){ setVisitePhotos("general", function(p){ return (p||[]).concat(arr); }); }}
          onDelete={function(i){ if(!window.confirm("Supprimer ?")) return;
            setVisitePhotos("general", function(p){ return (p||[]).filter(function(_,j){ return j!==i; }); }); }}
          onUpdate={function(i,u){ setVisitePhotos("general", function(p){ var a=[].concat(p||[]); a[i]=u; return a; }); }}
          onReorder={function(f,t){ setVisitePhotos("general", function(p){ var a=[].concat(p||[]); var it=a.splice(f,1)[0]; a.splice(t,0,it); return a; }); }}
          onReceiveCross={function(){}} onMoveTo={function(){}}
        />
      </div>
    </div>
  );
}




// ── ProgressPanel (avancement par jour, basé sur les photos) ────────────────
function ProgressPanel({ data, onClose }) {

  var [expandedDay, setExpandedDay] = useState(null);
  var [expandedSection, setExpandedSection] = useState(null);
  var [zoomPhoto, setZoomPhoto]   = useState(null);  // { url, name, uploadedBy, section, tab }
  var [zoomScale, setZoomScale]   = useState(1);
  var [viewMode, setViewMode]     = useState("byDay"); // "byDay" | "byPerson"

  // Build label map for all photo categories
  var sectionLabels = {};
  DC_SECTIONS.forEach(function(s) {
    (s.photoCats||[]).forEach(function(c) {
      sectionLabels[c.key] = { tab: "DC", tabColor: DC_COLOR, section: s.label.replace(/^\d+\s*·\s*/, ""), cat: c.label };
    });
    // string photos
    for (var i=0; i<20; i++) {
      sectionLabels["string_ph_"+i] = { tab: "DC", tabColor: DC_COLOR, section: "Strings", cat: "String "+(i+1) };
    }
  });
  AC_SECTIONS.forEach(function(s) {
    (s.photoCats||[]).forEach(function(c) {
      sectionLabels[c.key] = { tab: "AC", tabColor: AC_COLOR, section: s.label.replace(/^\d+\s*·\s*/, ""), cat: c.label };
    });
  });
  // Extra AC photo keys
  ["ac_pre_general","ac_pre_tgbt","ac_pre_compteur"].forEach(function(k){
    sectionLabels[k] = { tab:"AC", tabColor:AC_COLOR, section:"Pré-chantier", cat: k.replace("ac_pre_","").replace(/_/g," ") };
  });
  ["ac_post_tubages","ac_post_tgbt"].forEach(function(k){
    sectionLabels[k] = { tab:"AC", tabColor:AC_COLOR, section:"Après-chantier", cat: k.replace("ac_post_","").replace(/_/g," ") };
  });
  ["ac_config_ph","ac_schema_ph","mesure_terre_ph"].forEach(function(k){
    sectionLabels[k] = { tab:"AC", tabColor:AC_COLOR, section:"Configuration", cat: k.replace(/_ph$/,"").replace(/_/g," ") };
  });
  for (var i=0; i<8; i++) {
    sectionLabels["ac_app_"+i] = { tab:"AC", tabColor:AC_COLOR, section:"Onduleurs / Bornes", cat:"Appareil "+(i+1) };
    sectionLabels["ac_tab_"+i] = { tab:"AC", tabColor:AC_COLOR, section:"Tableaux", cat:"Tableau "+(i+1) };
  }
  // SAV photos
  Object.keys(data.savPhotos||{}).forEach(function(k){
    var isBefore = k.startsWith("sav_avant_");
    sectionLabels[k] = { tab:"SAV", tabColor:"#f39c12", section:"SAV", cat: isBefore ? "Avant" : "Après" };
  });
  // Maintenance photos
  (data.maintenanceVisites||[]).forEach(function(v, vi){
    if (v.photos) {
      Object.keys(v.photos).forEach(function(k){
        sectionLabels["maint_v"+vi+"_"+k] = { tab:"Maintenance", tabColor:GREEN, section:"Visite "+(vi+1), cat:k };
      });
    }
  });

  // Collect all photos with their date
  var allPhotos = [];

  function collectFromMap(photoMap, keyPrefix) {
    Object.keys(photoMap||{}).forEach(function(catKey) {
      (photoMap[catKey]||[]).forEach(function(p) {
        if (!p || !p.url) return;
        var fullKey = keyPrefix ? keyPrefix + catKey : catKey;
        var label = sectionLabels[catKey] || sectionLabels[fullKey] || {
          tab: "Autre", tabColor: MUTED, section: catKey, cat: catKey
        };
        allPhotos.push({
          url: p.url,
          name: p.name || "",
          addedAt: p.addedAt || null,
          catKey: catKey,
          tab: label.tab,
          tabColor: label.tabColor,
          section: label.section,
          cat: label.cat,
        });
      });
    });
  }

  collectFromMap(data.dc.photos||{});
  collectFromMap(data.ac.photos||{});
  collectFromMap(data.savPhotos||{});
  (data.maintenanceVisites||[]).forEach(function(v, vi){
    collectFromMap(v.photos||{}, "maint_v"+vi+"_"); // préfixe pour matcher sectionLabels
  });
  // Photos générales
  (data.photosGenerales||[]).forEach(function(p) {
    if (!p || !p.url) return;
    allPhotos.push({ url:p.url, name:p.name||"", addedAt:p.addedAt||null,
      catKey:"photos_generales", tab:"Général", tabColor:"#6c3483", section:"Photos générales", cat:"Photo" });
  });

  // ── Helpers groupement ───────────────────────────────────────────────────
  function groupBySection(photos) {
    var secMap = {}; var order = [];
    photos.forEach(function(p) {
      var key = p.tab+"|"+p.section;
      if (!secMap[key]) { secMap[key] = { tab:p.tab, tabColor:p.tabColor, section:p.section, photos:[] }; order.push(key); }
      secMap[key].photos.push(p);
    });
    return order.map(function(k){ return secMap[k]; });
  }
  // Par intervenant → par section (vue "Par jour" étendue)
  function groupByPersonThenSection(photos) {
    var pMap = {}; var pOrder = [];
    photos.forEach(function(p) {
      var who = p.uploadedBy || "Intervenant inconnu";
      if (!pMap[who]) { pMap[who] = []; pOrder.push(who); }
      pMap[who].push(p);
    });
    return pOrder.map(function(who){ return { who:who, sections:groupBySection(pMap[who]) }; });
  }

  // Collect journées clôturées
  var allJourneesMap = {}; // day -> []
  function addJournee(j) {
    if (!j.date) return;
    if (!allJourneesMap[j.date]) allJourneesMap[j.date] = [];
    allJourneesMap[j.date].push(j);
  }
  (data.dc.journeesCloturees||[]).forEach(addJournee);
  (data.ac.journeesCloturees||[]).forEach(addJournee);

  // Group by day
  var byDay = {};
  var noDate = [];
  allPhotos.forEach(function(p) {
    if (!p.addedAt) { noDate.push(p); return; }
    var day = p.addedAt.slice(0, 10); // YYYY-MM-DD
    if (!byDay[day]) byDay[day] = [];
    byDay[day].push(p);
  });
  // Ensure days with journées but no other photos are included
  Object.keys(allJourneesMap).forEach(function(d){ if(!byDay[d]) byDay[d]=[]; });

  var days = Object.keys(byDay).sort().reverse(); // plus récent en premier

  function fmtDay(isoDay) {
    var d = new Date(isoDay + "T12:00:00");
    return d.toLocaleDateString("fr-BE", { weekday:"long", day:"2-digit", month:"long", year:"numeric" });
  }


  var totalPhotos = allPhotos.length;
  var datedPhotos = allPhotos.filter(function(p){ return !!p.addedAt; }).length;

  return (
    <div style={{ position:"fixed", top:0, right:0, bottom:0, width:"min(520px,100vw)",
      background:WHITE, boxShadow:"-4px 0 28px rgba(0,0,0,0.15)", zIndex:9990,
      display:"flex", flexDirection:"column", fontFamily:"inherit" }}>

      {/* ── Zoom lightbox ── */}
      {zoomPhoto && (
        <div className="photo-lightbox-overlay"
          onClick={function(e){ if(e.target===e.currentTarget) { setZoomPhoto(null); setZoomScale(1); } }}
          style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.94)", zIndex:9999,
            display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}>
          <div style={{ position:"absolute", top:12, right:12, display:"flex", gap:8, zIndex:1 }}>
            <button onClick={function(){ setZoomScale(function(s){ return Math.min(s+0.5,4); }); }}
              style={{ background:"rgba(255,255,255,0.15)", border:"1px solid rgba(255,255,255,0.3)",
                color:WHITE, borderRadius:8, padding:"6px 14px", cursor:"pointer", fontSize:18, fontWeight:700, minHeight:0 }}>＋</button>
            <button onClick={function(){ setZoomScale(function(s){ return Math.max(s-0.5,0.5); }); }}
              style={{ background:"rgba(255,255,255,0.15)", border:"1px solid rgba(255,255,255,0.3)",
                color:WHITE, borderRadius:8, padding:"6px 14px", cursor:"pointer", fontSize:18, fontWeight:700, minHeight:0 }}>－</button>
            <button onClick={function(){ setZoomScale(1); }}
              style={{ background:"rgba(255,255,255,0.15)", border:"1px solid rgba(255,255,255,0.3)",
                color:WHITE, borderRadius:8, padding:"6px 12px", cursor:"pointer", fontSize:12, minHeight:0 }}>1:1</button>
            <button onClick={function(){ setZoomPhoto(null); setZoomScale(1); }}
              style={{ background:"rgba(255,255,255,0.18)", border:"none", color:WHITE,
                borderRadius:8, padding:"6px 14px", cursor:"pointer", fontSize:20, fontWeight:700, minHeight:0 }}>✕</button>
          </div>
          <div style={{ overflow:"auto", maxWidth:"90vw", maxHeight:"80vh", display:"flex", alignItems:"flex-start", justifyContent:"flex-start" }}>
            <img src={zoomPhoto.url} alt={zoomPhoto.name||""}
              style={{ transform:"scale("+zoomScale+")", transformOrigin:"top left",
                display:"block", maxWidth:zoomScale===1?"88vw":"none",
                maxHeight:zoomScale===1?"78vh":"none", transition:"transform 0.2s" }} />
          </div>
          <div style={{ position:"absolute", bottom:16, left:0, right:0, textAlign:"center" }}>
            {zoomPhoto.uploadedBy && (
              <span style={{ background:"rgba(108,52,131,0.85)", color:WHITE, borderRadius:20,
                padding:"4px 14px", fontSize:12, fontWeight:700, marginRight:8 }}>
                👤 {zoomPhoto.uploadedBy}
              </span>
            )}
            {(zoomPhoto.tab||zoomPhoto.section) && (
              <span style={{ background:"rgba(0,0,0,0.6)", color:"#ccc", borderRadius:20, padding:"4px 14px", fontSize:11 }}>
                {[zoomPhoto.tab, zoomPhoto.section].filter(Boolean).join(" — ")}
              </span>
            )}
            <div style={{ marginTop:6, fontSize:11, color:"rgba(255,255,255,0.45)" }}>
              Zoom : {Math.round(zoomScale*100)}% · cliquez en dehors pour fermer
            </div>
          </div>
        </div>
      )}

      {/* Panel header */}
      <div style={{ padding:"13px 16px", borderBottom:"1px solid #e8e8e4",
        display:"flex", alignItems:"center", justifyContent:"space-between",
        background:GREEN, color:WHITE, flexShrink:0 }}>
        <div>
          <div style={{ fontWeight:700, fontSize:14 }}>📅 Avancement par jour</div>
          <div style={{ fontSize:11, opacity:0.75, marginTop:2 }}>
            {data.meta.ref} — {data.meta.client || ""}
            {totalPhotos > 0 && <span style={{ marginLeft:8 }}>{totalPhotos} photo{totalPhotos>1?"s":""}</span>}
          </div>
        </div>
        <button onClick={onClose} style={{ background:"rgba(255,255,255,0.2)", border:"none",
          color:WHITE, borderRadius:6, padding:"4px 10px", cursor:"pointer", fontSize:16 }}>✕</button>
      </div>

      {/* View toggle */}
      <div style={{ display:"flex", gap:0, flexShrink:0, borderBottom:"1px solid #e8e8e4" }}>
        {[["byDay","📅 Par jour"],["byPerson","👤 Par intervenant"]].map(function(opt){
          var active = viewMode===opt[0];
          return (
            <button key={opt[0]} onClick={function(){ setViewMode(opt[0]); }}
              style={{ flex:1, padding:"8px 4px", border:"none", borderRadius:0, fontSize:11,
                fontWeight:active?700:400, cursor:"pointer", fontFamily:"inherit",
                background:active ? (opt[0]==="byPerson"?"#f5eef8":GREEN_LIGHT) : WHITE,

      <div style={{ flex:1, overflow:"auto", padding:"10px 12px" }}>

        {totalPhotos === 0 && Object.keys(allJourneesMap).length === 0 && (

            <div style={{ fontSize:40, marginBottom:12 }}>📅</div>

            <div style={{ fontSize:12, marginTop:4 }}>

            </div>
          </div>

        {/* ── VUE PAR INTERVENANT ── */}

          });
          var allJourneesList = (data.dc.journeesCloturees||[]).concat(data.ac.journeesCloturees||[]);
          allJourneesList.forEach(function(j) {

                  <div style={{ padding:"12px 14px", background:WHITE }}>
                    {/* Journées de cette personne */}
                    {actor.journees.map(function(j, ji) {
                      var d = new Date(j.date+"T12:00:00");
                      var dateStr = d.toLocaleDateString("fr-BE", { weekday:"long", day:"2-digit", month:"long" });
                      return (
                        <div key={ji} style={{ marginBottom:8, background:"#fff8e8",
                          border:"1px solid #f39c1244", borderRadius:7, padding:"8px 10px", fontSize:11, color:"#856404" }}>
                          ✅ Journée clôturée ({j.tab}) — {dateStr} {j.heure?"à "+j.heure:""}
                          {j.note && <div style={{ marginTop:3, color:"#555", fontStyle:"italic" }}>{j.note}</div>}
                        </div>
                      );
                    })}
                    {/* Photos par section */}
                    {secOrder.map(function(secKey, si) {
                      var sec = secMap[secKey];
                      var secOpen2 = expandedSection === "person_"+who+"_"+secKey;
                      return (
                        <div key={si} style={{ marginBottom:8 }}>
                          <div onClick={function(){ setExpandedSection(secOpen2 ? null : "person_"+who+"_"+secKey); }}
                            style={{ display:"flex", alignItems:"center", gap:8, padding:"7px 10px", borderRadius:7,
                              cursor:"pointer", background:secOpen2?(sec.tabColor||"#888")+"12":"#f8f8f6",
                              border:"1px solid "+((secOpen2 ? sec.tabColor||"#888" : "#e8e8e4")+"44") }}>
                            <span style={{ width:8, height:8, borderRadius:"50%", background:sec.tabColor||"#888", flexShrink:0 }} />
                            <span style={{ flex:1, fontWeight:600, fontSize:12 }}>{sec.tab} — {sec.section}</span>
                            <span style={{ fontSize:11, color:sec.tabColor||"#888", fontWeight:700 }}>{sec.photos.length} photo{sec.photos.length>1?"s":""}</span>
                            <span style={{ fontSize:10, color:MUTED, transform:secOpen2?"rotate(180deg)":"none" }}>▼</span>
                          </div>
                          {secOpen2 && (
                            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:6, padding:"8px 4px" }}>
                              {sec.photos.map(function(p, pi) {
                                var time = p.addedAt ? new Date(p.addedAt).toLocaleTimeString("fr-BE",{hour:"2-digit",minute:"2-digit"}) : "";
                                return (
                                  <div key={pi} style={{ borderRadius:7, overflow:"hidden", border:"1px solid "+BORDER, background:"#fafaf8" }}>
                                    <img src={p.url} style={{ width:"100%", aspectRatio:"4/3", objectFit:"cover", display:"block", cursor:"zoom-in" }}
                                      onClick={function(){ setZoomPhoto(Object.assign({},p,{section:sec.section,tab:sec.tab})); setZoomScale(1); }} />
                                    <div style={{ padding:"4px 6px", background:"#f0f0ec", lineHeight:1.4 }}>
                                      {time && <div style={{ fontSize:9, color:GREEN, fontWeight:700 }}>{time}</div>}
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          });
        })()}

        {/* ── VUE PAR JOUR ── */}
        {viewMode === "byDay" && days.map(function(day) {
          var dayPhotos   = byDay[day];
          var isOpen      = expandedDay === day;
          var dayJournees = allJourneesMap[day] || [];
          var daySections = groupBySection(dayPhotos);

          // Intervenants uniques pour badge dans le header
          var dayUploaders = [];
          dayPhotos.forEach(function(p) {
            if (p.uploadedBy && !dayUploaders.includes(p.uploadedBy)) dayUploaders.push(p.uploadedBy);
          });
          dayJournees.forEach(function(j) {
            if (j.auteur && !dayUploaders.includes(j.auteur)) dayUploaders.push(j.auteur);
          });

          return (
            <div key={day} style={{ marginBottom:10, borderRadius:9, border:"1px solid #e8e8e4", overflow:"hidden" }}>
              {/* Day header */}
              <div onClick={function(){ setExpandedDay(isOpen ? null : day); setExpandedSection(null); }}
                style={{ padding:"11px 14px", background:isOpen?GREEN_LIGHT:"#fafaf8",
                  cursor:"pointer", userSelect:"none",
                  display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontWeight:700, fontSize:13, color:isOpen?GREEN:"#1a1a1a", textTransform:"capitalize" }}>
                    📅 {fmtDay(day)}
                  </div>
                  {dayUploaders.length > 0 && (
                    <div style={{ fontSize:11, color:"#6c3483", marginTop:2, fontWeight:600 }}>
                      👥 {dayUploaders.join(", ")}
                    </div>
                  )}
                  <div style={{ display:"flex", gap:6, marginTop:4, flexWrap:"wrap" }}>
                    {dayJournees.length > 0 && (
                      <span style={{ fontSize:10, background:"#f39c1222", color:"#856404",
                        borderRadius:4, padding:"1px 7px", fontWeight:700, border:"1px solid #f39c1244" }}>
                        ✅ Journée clôturée
                      </span>
                    )}
                    {daySections.map(function(s, si) {
                      return (
                        <span key={si} style={{ fontSize:10, background:s.tabColor+"22",
                          color:s.tabColor, borderRadius:4, padding:"1px 7px", fontWeight:600 }}>
                          {s.tab} — {s.section} ({s.photos.length})
                        </span>
                      );
                    })}
                  </div>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:8, flexShrink:0 }}>
                  <span style={{ fontSize:12, color:MUTED }}>{dayPhotos.length} photo{dayPhotos.length>1?"s":""}</span>
                  <span style={{ color:MUTED, fontSize:12, transform:isOpen?"rotate(180deg)":"none", transition:"transform 0.2s" }}>▼</span>
                </div>
              </div>

              {/* Day content */}
              {isOpen && (
                <div style={{ padding:"10px 14px 14px", background:WHITE }}>
                  {/* Journées clôturées */}
                  {dayJournees.map(function(j, ji) {
                    return (
                      <div key={j.id||ji} style={{ marginBottom:10, background:"#fffbf0",
                        border:"1.5px solid #f39c12", borderRadius:8, padding:"9px 12px" }}>
                        <div style={{ fontWeight:700, fontSize:11, color:"#856404",
                          display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                          ✅ Journée clôturée — {j.tab}
                          {j.heure && <span style={{ fontWeight:400, color:MUTED }}>à {j.heure}</span>}
                          {j.auteur && <span style={{ color:"#6c3483" }}>· 👤 {j.auteur}</span>}
                        </div>
                        {j.note && (
                          <div style={{ fontSize:11, color:"#1a1a1a", lineHeight:1.5, marginTop:4,
                            background:WHITE, borderRadius:5, padding:"5px 8px",
                            borderLeft:"3px solid #f39c12", whiteSpace:"pre-wrap" }}>{j.note}</div>
                        )}
                      </div>
                    );
                  })}

                  {/* Sections avec photos — directement accessibles, sans nesting personne */}
                  {daySections.map(function(s, si) {
                    var secKey = day+"|"+s.tab+"|"+s.section;
                    var secOpen = expandedSection === secKey;
                    return (
                      <div key={si} style={{ marginBottom:8 }}>
                        <div onClick={function(){ setExpandedSection(secOpen ? null : secKey); }}
                          style={{ display:"flex", alignItems:"center", gap:8, padding:"7px 10px",
                            borderRadius:7, cursor:"pointer",
                            background:secOpen?s.tabColor+"12":"#f8f8f6",
                            border:"1px solid "+(secOpen?s.tabColor+"44":"#e8e8e4") }}>
                          <span style={{ width:8, height:8, borderRadius:"50%", background:s.tabColor, flexShrink:0 }} />
                          <span style={{ flex:1, fontWeight:600, fontSize:12 }}>{s.tab} — {s.section}</span>
                          <span style={{ fontSize:11, color:s.tabColor, fontWeight:700 }}>{s.photos.length} photo{s.photos.length>1?"s":""}</span>
                          <span style={{ fontSize:10, color:MUTED, transform:secOpen?"rotate(180deg)":"none", transition:"0.2s" }}>▼</span>
                        </div>
                        {secOpen && (
                          <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:6, padding:"6px 4px" }}>
                            {s.photos.map(function(p, pi) {
                              var time = p.addedAt ? new Date(p.addedAt).toLocaleTimeString("fr-BE",{hour:"2-digit",minute:"2-digit"}) : "";
                              return (
                                <div key={pi} style={{ borderRadius:7, overflow:"hidden", border:"1px solid "+BORDER, background:"#fafaf8" }}>
                                  <img src={p.url} alt={p.name||""}
                                    style={{ width:"100%", aspectRatio:"4/3", objectFit:"cover", display:"block", cursor:"zoom-in" }}
                                    onClick={function(){ setZoomPhoto(Object.assign({},p,{section:s.section,tab:s.tab,tabColor:s.tabColor})); setZoomScale(1); }} />
                                  <div style={{ padding:"4px 6px", background:"#f0f0ec", lineHeight:1.4 }}>
                                    {p.uploadedBy && (
                                      <div style={{ fontSize:10, fontWeight:800, color:"#6c3483",
                                        overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                                        👤 {p.uploadedBy}
                                      </div>
                                    )}
                                    {time && <div style={{ fontSize:9, color:GREEN, fontWeight:700 }}>{time}</div>}
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}



        {/* Photos sans date */}
        {viewMode === "byDay" && noDate.length > 0 && (
          <div style={{ marginBottom:10, borderRadius:9, border:"1px dashed #e8e0b0", overflow:"hidden" }}>
            <div onClick={function(){ setExpandedDay(expandedDay==="nodate" ? null : "nodate"); }}
              style={{ padding:"10px 14px", background:"#fffdf0", cursor:"pointer",
                display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <span style={{ fontWeight:600, fontSize:12, color:"#856404" }}>
                📁 Photos sans date ({noDate.length})
              </span>
              <span style={{ fontSize:10, color:"#856404" }}>▼</span>
            </div>
            {expandedDay === "nodate" && (
              <div style={{ display:"grid", gridTemplateColumns:"repeat(3, 1fr)", gap:6, padding:"10px" }}>
                {noDate.map(function(p, pi) {
                  return (
                    <div key={pi} style={{ borderRadius:7, overflow:"hidden", border:"1px solid "+BORDER, background:"#fafaf8" }}>
                      <img src={p.url} alt={p.name}
                        style={{ width:"100%", aspectRatio:"4/3", objectFit:"cover", display:"block", cursor:"zoom-in" }}
                        onClick={function(){ setZoomPhoto(p); setZoomScale(1); }}
                      />
                      <div style={{ padding:"4px 6px", background:"#f0f0ec", lineHeight:1.4 }}>
                        {p.uploadedBy && <div style={{ fontSize:10, fontWeight:800, color:"#6c3483", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>👤 {p.uploadedBy}</div>}
                        {!p.uploadedBy && p.name && <div style={{ fontSize:9, color:MUTED, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{p.name}</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ── HistoryPanel (contrôle) ─────────────────────────────────────────────────
function HistoryPanel({ refChantier, sheetId, sheetLabel, onRestore, onClose }) {
  var [tab, setTab] = useState("audit");
  var [versions, setVersions] = useState([]);
  var [auditLog, setAuditLog] = useState([]);
  var [loading, setLoading] = useState(true);
  var [restoring, setRestoring] = useState(null);

  useEffect(function() {
    if (!refChantier) return;
    setLoading(true);
    var p1 = sheetId ? supaCtrlLoadVersions(refChantier, sheetId) : Promise.resolve([]);
    var p2 = supaCtrlLoadAudit(refChantier, sheetId);
    Promise.all([p1, p2]).then(function(res) {
      setVersions(Array.isArray(res[0]) ? res[0] : []);
      setAuditLog(Array.isArray(res[1]) ? res[1] : []);
      setLoading(false);
    }).catch(function(e) {
      console.error("[HistoryPanel] load error:", e);
      setLoading(false);
    });
  }, [refChantier, sheetId]);

  function fmtDate(iso) {
    if (!iso) return "—";
    var d = new Date(iso);
    return d.toLocaleDateString("fr-BE", { day:"2-digit", month:"2-digit", year:"numeric" }) + " " +
           d.toLocaleTimeString("fr-BE", { hour:"2-digit", minute:"2-digit" });
  }
  var ACT = {
    save: "💾 Sauvegarde", photo_add: "📷 Photo ajoutée", photo_delete: "🗑️ Photo supprimée",
    restore: "↩️ Restauration", load: "👁️ Consultation",
    lock_dc: "🔒 DC verrouillé", lock_ac: "🔒 AC verrouillé"
  };

  return (
    <div style={{ position:"fixed", top:0, right:0, bottom:0, width:"min(480px,100vw)",
      background:WHITE, boxShadow:"-4px 0 28px rgba(0,0,0,0.15)", zIndex:9990,
      display:"flex", flexDirection:"column", fontFamily:"inherit" }}>
      <div style={{ padding:"13px 16px", borderBottom:"1px solid #e8e8e4",
        display:"flex", alignItems:"center", justifyContent:"space-between",
        background:GREEN, color:WHITE, flexShrink:0 }}>
        <div>
          <div style={{ fontWeight:700, fontSize:13 }}>📋 Historique — {refChantier}</div>
          {sheetLabel && <div style={{ fontSize:11, opacity:0.75, marginTop:2 }}>{sheetLabel}</div>}
          {!sheetId && <div style={{ fontSize:11, opacity:0.6, marginTop:2 }}>Aucune feuille ouverte — journal global seulement</div>}
        </div>
        <button onClick={onClose} style={{ background:"rgba(255,255,255,0.18)", border:"none",
          color:WHITE, borderRadius:6, padding:"3px 9px", cursor:"pointer", fontSize:15 }}>✕</button>
      </div>
      <div style={{ display:"flex", borderBottom:"1px solid #e8e8e4", flexShrink:0 }}>
        {(sheetId ? [["audit","📝 Journal"],["versions","🔄 Versions"]] : [["audit","📝 Journal"]]).map(function(t) {
          return <button key={t[0]} onClick={function(){ setTab(t[0]); }}
            style={{ flex:1, padding:"9px 4px", border:"none",
              background:tab===t[0]?"#f0f7f2":WHITE, color:tab===t[0]?GREEN:MUTED,
              fontWeight:tab===t[0]?700:400, cursor:"pointer", fontSize:12,
              borderBottom:tab===t[0]?"2.5px solid "+GREEN:"2.5px solid transparent",
              fontFamily:"inherit" }}>
            {loading ? t[1] : t[1] + (t[0]==="audit" ? " ("+auditLog.length+")" : " ("+versions.length+")")}
          </button>;
        })}
      </div>
      <div style={{ flex:1, overflow:"auto", padding:"10px 12px" }}>
        {loading && <div style={{ textAlign:"center", padding:48, color:"#aaa", fontSize:13 }}>⏳ Chargement…</div>}
        {!loading && tab === "versions" && (
          <div>
            <div style={{ fontSize:11, color:"#999", marginBottom:10, background:"#fffdf0",
              border:"1px solid #e8e0b0", borderRadius:6, padding:"6px 10px" }}>
              ℹ️ Les versions restaurent les données du formulaire. Les photos ne sont pas affectées.
            </div>
            {versions.length === 0 && <div style={{ textAlign:"center", padding:40, color:"#bbb", fontSize:13 }}>Aucune version disponible</div>}
            {versions.map(function(v, i) {
              return (
                <div key={v.id} style={{ background:i===0?"#f0f7f2":"#fafaf8",
                  border:"1px solid "+(i===0?"#d4ead9":"#e8e8e4"), borderRadius:8,
                  padding:"10px 12px", marginBottom:8 }}>
                  <div style={{ display:"flex", alignItems:"flex-start", gap:8 }}>
                    <div style={{ flex:1, minWidth:0 }}>
                      {i===0 && <span style={{ fontSize:9, fontWeight:700, color:GREEN, background:"#d4ead9",
                        padding:"1px 6px", borderRadius:4, marginBottom:4,
                        display:"inline-block", textTransform:"uppercase" }}>Dernière version</span>}
                      <div style={{ fontSize:12, fontWeight:600, color:"#1a1a1a" }}>{fmtDate(v.created_at)}</div>
                      <div style={{ fontSize:11, color:MUTED, marginTop:2 }}>👤 {v.user_name}
                        <span style={{ color:"#bbb" }}> ({v.user_email})</span></div>
                      {v.label && <div style={{ fontSize:11, color:"#888", marginTop:3, fontStyle:"italic",
                        overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{v.label}</div>}
                    </div>
                    {i > 0 && (
                      <button disabled={restoring===v.id} onClick={function(){
                        if (!window.confirm("Restaurer la version du " + fmtDate(v.created_at) + " ?")) return;
                        setRestoring(v.id);
                        onRestore(v.data, function(){ setRestoring(null); });
                      }} style={{ background:restoring===v.id?"#ccc":GREEN, color:WHITE, border:"none",
                        borderRadius:6, padding:"6px 10px", cursor:restoring===v.id?"not-allowed":"pointer",
                        fontSize:11, fontWeight:600, whiteSpace:"nowrap", flexShrink:0 }}>
                        {restoring===v.id ? "⏳" : "↩ Restaurer"}
                      </button>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        )}
        {!loading && tab === "audit" && (
          <div>
            {auditLog.length === 0 && (
              <div style={{ textAlign:"center", padding:40, color:"#bbb", fontSize:13 }}>
                <div style={{ fontSize:36, marginBottom:8 }}>📋</div>
                <div>Aucune entrée dans le journal</div>
                <div style={{ fontSize:11, marginTop:6 }}>Les actions (sauvegardes, ajouts de photos…) apparaîtront ici</div>
              </div>
            )}
            {auditLog.map(function(entry) {
              var isDel = entry.action === "photo_delete";
              var isLock = entry.action && entry.action.startsWith("lock_");
              return (
                <div key={entry.id} style={{ background:isDel?"#fff8f7":isLock?"#f0f7f2":"#fafaf8",
                  border:"1px solid "+(isDel?"#fcd9d4":isLock?"#d4ead9":"#e8e8e4"), borderRadius:8,
                  padding:"8px 11px", marginBottom:6 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:3 }}>
                    <span style={{ fontSize:12, fontWeight:600, color:isDel?"#c0392b":isLock?GREEN:"#1a1a1a" }}>
                      {ACT[entry.action] || entry.action}
                    </span>
                    <span style={{ fontSize:10, color:"#aaa", marginLeft:"auto", whiteSpace:"nowrap" }}>
                      {fmtDate(entry.created_at)}
                    </span>
                  </div>
                  <div style={{ fontSize:11, color:MUTED }}>👤 {entry.user_name}
                    <span style={{ color:"#bbb" }}> ({entry.user_email})</span></div>
                  {entry.detail && entry.detail.label && (
                    <div style={{ fontSize:11, color:"#555", background:"#f0f0ec",
                      borderRadius:4, padding:"3px 7px", marginTop:4, fontStyle:"italic" }}>
                      {entry.detail.label}
                    </div>
                  )}
                  {entry.detail && entry.detail.changes && entry.detail.changes.length > 0 && (
                    <div style={{ fontSize:11, color:"#555", background:"#f0f0ec",
                      borderRadius:4, padding:"4px 8px", marginTop:4 }}>
                      {entry.detail.changes.map(function(c,ci){ return <div key={ci} style={{ lineHeight:1.6 }}>• {c}</div>; })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}


// ── ChantierPanel (lecture seule — fiche complète) ─────────────────────────
function ChantierPanel({ refChantier, onClose }) {
  var [chData, setChData] = useState(null);
  var [loading, setLoading] = useState(true);
  var [error, setError] = useState(false);
  var [openSection, setOpenSection] = useState("client");

  useEffect(function() {
    if (!refChantier) return;
    setLoading(true); setError(false);
    supaLoadChantier(refChantier).then(function(d) {
      if (d) { setChData(d); } else { setError(true); }
      setLoading(false);
    });
  }, [refChantier]);

  function tv(v) { return v || "—"; }

  function Section({ id, title, children }) {
    var open = openSection === id;
    return (
      <div style={{ marginBottom: 8, borderRadius: 8, border: "1px solid #e8e8e4", overflow: "hidden" }}>
        <div onClick={function(){ setOpenSection(open ? null : id); }}
          style={{ padding: "9px 14px", background: open ? GREEN_LIGHT : "#fafaf8",
            display: "flex", justifyContent: "space-between", alignItems: "center",
            cursor: "pointer", userSelect: "none" }}>
          <span style={{ fontWeight: 700, fontSize: 12, color: GREEN }}>{title}</span>
          <span style={{ fontSize: 11, color: MUTED, transform: open?"rotate(180deg)":"none", transition:"transform 0.2s" }}>▼</span>
        </div>
        {open && <div style={{ padding: "10px 14px", background: WHITE }}>{children}</div>}
      </div>
    );
  }

  function Row({ label, value }) {
    if (!value || value === "—") return null;
    return (
      <div style={{ display:"flex", gap:8, padding:"5px 0",
        borderBottom:"1px solid #f5f5f0", fontSize:13, alignItems:"flex-start" }}>
        <span style={{ flex:"0 0 130px", color:MUTED, fontSize:11, paddingTop:1 }}>{label}</span>
        <span style={{ flex:1, fontWeight:500, wordBreak:"break-word" }}>{value}</span>
      </div>
    );
  }

  function Badge({ v }) {
    if (!v || v === "NON") return null;
    return <span style={{ background: GREEN, color: WHITE, borderRadius:4,
      padding:"1px 7px", fontSize:11, fontWeight:600, marginLeft:6 }}>OUI</span>;
  }

  return (
    <div style={{ position:"fixed", top:0, right:0, bottom:0, width:"min(500px,100vw)",
      background:WHITE, boxShadow:"-4px 0 28px rgba(0,0,0,0.15)", zIndex:9990,
      display:"flex", flexDirection:"column", fontFamily:"inherit" }}>

      {/* Header */}
      <div style={{ padding:"13px 16px", borderBottom:"1px solid #e8e8e4",
        display:"flex", alignItems:"center", justifyContent:"space-between",
        background:"#2e8b57", color:WHITE, flexShrink:0 }}>
        <div>
          <div style={{ fontWeight:700, fontSize:14 }}>📋 Briefing de Chantier</div>
          <div style={{ fontSize:11, opacity:0.75, marginTop:2 }}>
            {refChantier} — Lecture seule
          </div>
        </div>
        <button onClick={onClose} style={{ background:"rgba(255,255,255,0.2)", border:"none",
          color:WHITE, borderRadius:6, padding:"4px 10px", cursor:"pointer", fontSize:16 }}>✕</button>
      </div>

      {/* Read-only badge */}
      <div style={{ background:"#fff8e1", borderBottom:"1px solid #ffe082",
        padding:"6px 14px", fontSize:11, color:"#856404", flexShrink:0,
        display:"flex", alignItems:"center", gap:6 }}>
        👁️ Données du briefing — modifications uniquement dans l'app Briefing de Chantier
      </div>

      <div style={{ flex:1, overflow:"auto", padding:"10px 12px" }}>
        {loading && <div style={{ textAlign:"center", padding:48, color:"#aaa", fontSize:13 }}>⏳ Chargement…</div>}
        {error && (
          <div style={{ textAlign:"center", padding:40, fontSize:13 }}>
            <div style={{ fontSize:24, marginBottom:8 }}>⚠️</div>
            <div style={{ color:"#c0392b", fontWeight:600 }}>Aucun briefing trouvé</div>
            <div style={{ color:MUTED, marginTop:4, fontSize:12 }}>Référence : {refChantier}</div>
          </div>
        )}

        {chData && (
          <div>
            {/* ─ Client ─ */}
            <Section id="client" title="👤 Client & chantier">

                  return (

            {/* ─ Informations techniques ─ */}
