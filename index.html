        )}
      </div>
    </div>
  );
}

// ── WhatsAppNotify ────────────────────────────────────────────────────────────
function WhatsAppNotify({ data, tab, dcComp, acComp }) {
  var [copied, setCopied] = useState(false);
  var [showPreview, setShowPreview] = useState(false);
  var [pmPhone, setPmPhone] = useState(null);

  var ref     = data.meta.ref || "—";
  var client  = data.meta.client || "Client inconnu";
  var adresse = data.meta.adresse || "";
  var pm      = data.meta.pm || "";

  // Load PM phone from briefing
  useEffect(function() {
    if (!ref || ref === "—") return;
    supaLoadChantier(ref).then(function(d) {
      if (d && d.weGreen && d.weGreen.tel) {
        // Normalize: remove spaces, dots, dashes, leading +
        var t = d.weGreen.tel.replace(/[\s\.\-\(\)]/g, "").replace(/^\+/, "");
        setPmPhone(t || null);
      }
    });
  }, [ref]);

  var reportUrl = "https://b-hers.github.io/Rapport-de-chantier-SAV-Maintenance/?ref=" + encodeURIComponent(ref);

  // Status lines
  var dcStr = data.meta.dcLocked ? "DC verrouille" : (dcComp && dcComp.pct > 0 ? "DC " + dcComp.pct + "%" + (dcComp.nokCount > 0 ? " (" + dcComp.nokCount + " NOK)" : " OK") : "DC non demarre");
  var acStr = data.meta.acLocked ? "AC verrouille" : (acComp && acComp.pct > 0 ? "AC " + acComp.pct + "%" + (acComp.nokCount > 0 ? " (" + acComp.nokCount + " NOK)" : " OK") : "AC non demarre");
  var savStr = (data.sav||[]).length > 0 ? "SAV: " + (data.sav||[]).length + " intervention(s)" : "";
  var maintStr = (data.maintenanceVisites||[]).length > 0 ? "Maintenance: " + (data.maintenanceVisites||[]).length + " visite(s)" : "";

  // Daily closure info
  var allJournees = [];
  (data.dc.journeesCloturees||[]).forEach(function(j){ allJournees.push(Object.assign({},j,{tab:"DC"})); });
  (data.ac.journeesCloturees||[]).forEach(function(j){ allJournees.push(Object.assign({},j,{tab:"AC"})); });
  // Find today's closures
  var today = new Date().toISOString().slice(0,10);
  var todayJournees = allJournees.filter(function(j){ return j.date === today; });
  var journeeStr = todayJournees.length > 0
    ? "📅 Journée clôturée (" + todayJournees.map(function(j){ return j.tab + (j.auteur ? " par " + j.auteur : ""); }).join(", ") + ")"
    : "";

  var tabLabel = {dc:"DC", ac:"AC", sav:"SAV", maintenance:"Maintenance"}[tab] || tab;

  // Build lines array then join safely
  var msgLines = ["Rapport de Chantier -- " + ref, "Client : " + client];
  if (adresse) msgLines.push("Adresse : " + adresse);
  if (pm) msgLines.push("PM : " + pm);
  msgLines.push("");
  if (journeeStr) msgLines.push(journeeStr);
  msgLines.push(dcStr);
  msgLines.push(acStr);
  if (savStr) msgLines.push(savStr);
  if (maintStr) msgLines.push(maintStr);
  msgLines.push("");
  msgLines.push("Rapport : " + reportUrl);

  // Join with %0A for WhatsApp URL, newline for display
  var messageDisplay  = msgLines.join(String.fromCharCode(10));
  var messageEncoded  = msgLines.map(encodeURIComponent).join("%0A");

  var waUrlPM    = pmPhone ? "https://wa.me/" + pmPhone + "?text=" + messageEncoded : null;
  var waUrlGroup = WA_GROUP;

  function copyAndOpenGroup() {
    var openGroup = function() { window.open(waUrlGroup, "_blank"); };
    try {
      navigator.clipboard.writeText(messageDisplay).then(function() {
        setCopied(true);
        setTimeout(function(){ setCopied(false); }, 4000);
        openGroup();
      }).catch(openGroup);
    } catch(e) { openGroup(); }
  }

  return (
    <div id="no-print" style={{ marginTop: 24, background: "#f0fff4",
      border: "1.5px solid #a8e6c0", borderRadius: 10, padding: "14px 16px" }}>
      <div style={{ fontWeight: 700, fontSize: 13, color: GREEN, marginBottom: 10,
        display: "flex", alignItems: "center", gap: 8 }}>
        <span style={{ fontSize: 18 }}>📤</span>
        {journeeStr ? "Notifier — journée clôturée" : "Notifier — fin de l'étape " + tabLabel}
      </div>

      {/* Preview toggle */}
      <button onClick={function(){ setShowPreview(function(v){ return !v; }); }}
        style={{ fontSize: 11, color: MUTED, background: "none", border: "none",
          cursor: "pointer", textDecoration: "underline", marginBottom: showPreview ? 8 : 12,
          padding: 0, minHeight: 0, display: "block" }}>
        {showPreview ? "▲ Masquer le message" : "▼ Aperçu du message"}
      </button>

      {showPreview && (
        <pre style={{ background: WHITE, border: "1px solid " + BORDER, borderRadius: 8,
          padding: "10px 14px", marginBottom: 12, fontSize: 12, color: "#1a1a1a",
          whiteSpace: "pre-wrap", wordBreak: "break-word",
          maxHeight: 200, overflowY: "auto", fontFamily: "monospace" }}>
          {messageDisplay}
        </pre>
      )}

      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
        {waUrlPM ? (
          <a href={waUrlPM} target="_blank" rel="noopener noreferrer"
            style={{ display: "inline-flex", alignItems: "center", gap: 7,
              padding: "10px 18px", background: "#25D366", color: WHITE,
              borderRadius: 8, fontSize: 13, fontWeight: 700,
              textDecoration: "none", whiteSpace: "nowrap" }}>
            💬 PM — {pm.split(" ")[0]}
          </a>
        ) : (
          <div style={{ fontSize: 11, color: "#856404", background: "#fff8e1",
            borderRadius: 7, padding: "8px 12px", flex: 1 }}>
            {pmPhone === null && ref !== "—"
              ? "⏳ Chargement numéro PM…"
              : "⚠️ Numéro PM non renseigné dans le Briefing de Chantier"}
          </div>
        )}

        <button onClick={copyAndOpenGroup}
          style={{ display: "inline-flex", alignItems: "center", gap: 7,
            padding: "10px 18px", background: "#128C7E", color: WHITE,
            border: "none", borderRadius: 8, fontSize: 13, fontWeight: 700,
            cursor: "pointer", whiteSpace: "nowrap" }}>
          👥 {copied ? "✅ Copié!" : "Groupe WGE"}
        </button>
      </div>

      {copied && (
        <div style={{ fontSize: 11, color: "#27ae60", marginTop: 8 }}>
          ✅ Message copié — collez-le dans le groupe WhatsApp qui vient de s'ouvrir
        </div>
      )}
    </div>
  );
}

// ── HeaderSection ─────────────────────────────────────
function HeaderSection({ data, setData, onLoad, onPrefill, prefillMsg, loading }) {
  var [refInput, setRefInput] = useState(data.meta.ref||"");
  function setMeta(key, val) { setData(function(prev){ var n=Object.assign({},prev); n.meta=Object.assign({},prev.meta); n.meta[key]=val; return n; }); }
  return (
    <div style={{ background: WHITE, padding: "14px", borderBottom: "1px solid #e8e8e4" }}>
      <div style={{ fontWeight: 700, fontSize: 12, color: GREEN, marginBottom: 12, textTransform: "uppercase", letterSpacing: "0.07em" }}>📋 Identification du chantier</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))", gap: 10 }}>
        <div>
          <label style={{ fontSize: 12, color: MUTED, fontWeight: 500, marginBottom: 4, display: "block" }}>Référence chantier *</label>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
            <input type="text" value={refInput} onChange={function(e){ setRefInput(e.target.value); }}
              onBlur={function(){
                setMeta("ref", refInput);
                if(refInput) onLoad(refInput);
              }}
              onKeyDown={function(e){ if(e.key==="Enter"){
                setMeta("ref",refInput);
                if(refInput) onLoad(refInput);
              } }}
              placeholder="WG-2025-0123" style={{ flex: 1 }} />
            {loading && <span style={{ fontSize: 11, color: MUTED }}>⏳</span>}
          </div>
          {refInput && (
            <button onClick={function(){ onPrefill(refInput); }}
              style={{ marginTop: 5, fontSize: 11, color: DC_COLOR, background: "none", border: "none", cursor: "pointer", padding: 0, textDecoration: "underline", minHeight: 0 }}>
              ↩ Importer depuis la feuille de chantier
            </button>
          )}
          {prefillMsg && <div style={{ fontSize: 11, marginTop: 3, color: prefillMsg.startsWith("✅") ? "#27ae60" : "#e74c3c" }}>{prefillMsg}</div>}
        </div>
        <div>
          <label style={{ fontSize: 12, color: MUTED, fontWeight: 500, marginBottom: 4, display: "block" }}>Client</label>
          <input type="text" value={data.meta.client||""} onChange={function(e){ setMeta("client",e.target.value); }} placeholder="Nom du client" />
        </div>
        <div>
          <label style={{ fontSize: 12, color: MUTED, fontWeight: 500, marginBottom: 4, display: "block" }}>Adresse</label>
          <input type="text" value={data.meta.adresse||""} onChange={function(e){ setMeta("adresse",e.target.value); }} placeholder="Adresse du chantier" />
        </div>
        <div>
          <label style={{ fontSize: 12, color: MUTED, fontWeight: 500, marginBottom: 4, display: "block" }}>Project Manager</label>
          <select value={data.meta.pm||""} onChange={function(e){ setMeta("pm",e.target.value); }}>
            <option value="">— Sélectionner —</option>
            {PM_LIST.map(function(pm){ return <option key={pm} value={pm}>{pm}</option>; })}
          </select>
        </div>
        {data.meta.nom_tache && (
          <div style={{ gridColumn: "1 / -1" }}>
            <label style={{ fontSize: 12, color: MUTED, fontWeight: 500, marginBottom: 4, display: "block" }}>Tâche Odoo</label>
            <input type="text" value={data.meta.nom_tache||""} readOnly
              style={{ background: "#f4f4f0", color: "#555", cursor: "default" }}
              placeholder="Nom de la tâche" />
          </div>
        )}
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────
function App() {
  var [user, setUser] = useState(null);
  var [data, setData] = useState(makeDefaultData);
  var [currentSheetId, setCurrentSheetId] = useState(null);
  var [currentSheetLabel, setCurrentSheetLabel] = useState("");
  var [activeTab, setActiveTab] = useState("dc");
  var [saveStatus, setSaveStatus] = useState("idle");
  var [loading, setLoading] = useState(false);
  var [prefillMsg, setPrefillMsg] = useState("");
  var [showHistory, setShowHistory] = useState(false);
  var [showChantier, setShowChantier] = useState(false);
  var [showProgress, setShowProgress] = useState(false);
  var saveTimerRef       = useRef(null);
  var isSavingRef        = useRef(false);   // mutex : empêche deux sauvegardes simultanées
  var pendingSaveRef     = useRef(false);   // une modification est arrivée pendant une sauvegarde
  var lastSavedRef       = useRef(null);
  var lastDbUpdatedAt    = useRef(null);
  var [pendingChanges, setPendingChanges] = useState(false); // modifications non sauvegardées
  var isLoadingData      = useRef(false);
  var userRef            = useRef(null);
  var prevDataRef        = useRef(null);
  var latestDataRef      = useRef(data);    // toujours synchronisé avec le state React
  var currentSheetIdRef  = useRef(null);    // miroir de currentSheetId pour éviter les closures périmées

  // Toujours à jour
  useEffect(function() { latestDataRef.current = data; });
  useEffect(function() { currentSheetIdRef.current = currentSheetId; }, [currentSheetId]);

  // Load user from localStorage
  useEffect(function() {
    // Mode client : connexion automatique comme lecteur sans auth Google
    if (CLIENT_MODE) {
      var clientUser = { name: "Client (lecture seule)", email: "", type: "client", picture: "" };
      setUser(clientUser); userRef.current = clientUser;
      return;
    }
    try {
      var stored = localStorage.getItem("wge_user");
      if (stored) { var u = JSON.parse(stored); if (u && u.name) { setUser(u); userRef.current = u; } }
    } catch(e) {}
  }, []);

  useEffect(function() { userRef.current = user; window._wgeCurrentUser = user; }, [user]);

  var [storageWarning, setStorageWarning] = useState(null); // message d'avertissement Storage

  useEffect(function() {
    // Vérifier la table principale
    fetch(SUPA_URL + "/rest/v1/feuilles_controle?limit=0",
      { headers: { "apikey": SUPA_KEY, "Authorization": "Bearer " + SUPA_KEY } })
    .then(function(res) {
      if (res.status === 404) console.warn("[Rapport] ⚠️ Table feuilles_controle introuvable.");
    }).catch(function(){});

    // Vérifier le bucket via l'API list (fonctionne avec la clé publishable)
    fetch(SUPA_URL + "/storage/v1/object/list/" + SUPA_STORAGE_BUCKET,
      { method: "POST",
        headers: { "apikey": SUPA_KEY, "Authorization": "Bearer " + SUPA_KEY,
          "Content-Type": "application/json" },
        body: JSON.stringify({ limit: 1, offset: 0, prefix: "" }) })
    .then(function(res) {
      if (!res.ok) {
        setStorageWarning("⚠️ Le bucket Supabase Storage \"" + SUPA_STORAGE_BUCKET + "\" est introuvable. " +
          "Les photos resteront en base64 et les sauvegardes pourraient échouer pour les gros chantiers. " +
          "Créez ce bucket dans votre projet Supabase (Storage → New bucket → \"" + SUPA_STORAGE_BUCKET + "\" → Public).");
        console.error("[Rapport] STORAGE BUCKET MANQUANT :", SUPA_STORAGE_BUCKET);
      }
    }).catch(function(){});
  }, []);

  useEffect(function() {
    try {
      var params = new URLSearchParams(window.location.search);
      var urlRef = params.get("ref");
      var urlTask = params.get("task") || "";
      if (!urlRef) return;
      isLoadingData.current = true;
      setData(function(prev) {
        var n = Object.assign({}, prev);
        n.meta = Object.assign({}, prev.meta, { ref: urlRef, nom_tache: urlTask });
        return n;
      });
      loadData(urlRef, urlTask);
    } catch(e) { isLoadingData.current = false; }
  }, []);

  // ── Fusion des URLs Storage dans les données les plus récentes ────────────
  // Après l'upload, on ne peut pas utiliser result.data tel quel (snapshot périmé).
  // On prend latestDataRef (texte à jour) et on y injecte uniquement les URL Storage.
  function mergeStorageUrls(latestData, dataWithUrls) {
    var result = JSON.parse(JSON.stringify(latestData));

    function mergePhotoArr(latestArr, storageArr) {
      return (latestArr||[]).map(function(p, i) {
        if (!p) return p;
        var sp = storageArr && storageArr[i];
        if (!sp) return p;
        var merged = Object.assign({}, p);
        if (sp.url && !sp.url.startsWith("data:") && p.url && p.url.startsWith("data:"))
          merged.url = sp.url;
        if (sp.drawingUrl && !sp.drawingUrl.startsWith("data:") && p.drawingUrl && p.drawingUrl.startsWith("data:"))
          merged.drawingUrl = sp.drawingUrl;
        return merged;
      });
    }
    function mergePhotoMap(latestMap, storageMap) {
      var m = Object.assign({}, latestMap);
      Object.keys(storageMap||{}).forEach(function(k) {
        m[k] = mergePhotoArr(m[k]||[], storageMap[k]||[]);
      });
      return m;
    }
    function mergeDocArr(latestArr, storageArr) {
      return (latestArr||[]).map(function(d, i) {
        if (!d) return d;
        var sd = storageArr && storageArr[i];
        if (sd && sd.url && !sd.url.startsWith("data:") && d.url && d.url.startsWith("data:"))
          return Object.assign({}, d, { url: sd.url });
        return d;
      });
    }

    if (dataWithUrls.dc && result.dc)
      result.dc.photos = mergePhotoMap(result.dc.photos, (dataWithUrls.dc||{}).photos);
    if (dataWithUrls.ac && result.ac)
      result.ac.photos = mergePhotoMap(result.ac.photos, (dataWithUrls.ac||{}).photos);
    if (dataWithUrls.savPhotos)
      result.savPhotos = mergePhotoMap(result.savPhotos, dataWithUrls.savPhotos);
    if (dataWithUrls.maintenanceVisites) {
      (dataWithUrls.maintenanceVisites||[]).forEach(function(sv, vi) {
        if (!result.maintenanceVisites||!result.maintenanceVisites[vi]) return;
        result.maintenanceVisites[vi].photos = mergePhotoMap(
          result.maintenanceVisites[vi].photos, sv.photos||{});
        result.maintenanceVisites[vi].photosGenerales = mergePhotoArr(
          result.maintenanceVisites[vi].photosGenerales, sv.photosGenerales);
      });
    }
    if (dataWithUrls.photosGenerales)
      result.photosGenerales = mergePhotoArr(result.photosGenerales, dataWithUrls.photosGenerales);
    if (dataWithUrls.admin && dataWithUrls.admin.sections && result.admin && result.admin.sections) {
      Object.keys(dataWithUrls.admin.sections||{}).forEach(function(sk) {
        if (!result.admin.sections[sk]) return;
        result.admin.sections[sk].docs = mergeDocArr(
          result.admin.sections[sk].docs, (dataWithUrls.admin.sections[sk]||{}).docs);
      });
    }
    return result;
  }

  // ── Fusion multi-utilisateurs ─────────────────────────────────────────────
  // Stratégie :
  //   • Texte/checklist   → version locale gagne (dernier à sauvegarder)
  //   • Photos            → UNION par URL  (aucune photo n'est jamais perdue)
  //   • Tableaux avec id  → UNION par id  (SAV, journées, maintenance…)
  function mergePhotosFromDB(localData, dbData) {
    if (!dbData) return localData;
    var merged = JSON.parse(JSON.stringify(localData));

    function unionPhotoMap(localMap, dbMap) {
      var result = Object.assign({}, localMap);
      Object.keys(dbMap||{}).forEach(function(catKey) {
        var lp = (localMap||{})[catKey] || [];
        var dp = (dbMap||{})[catKey]    || [];
        var localUrls = new Set(lp.map(function(p){ return p&&p.url; }).filter(Boolean));
        var toAdd = dp.filter(function(p){ return p&&p.url && !localUrls.has(p.url); });
        if (toAdd.length > 0) result[catKey] = lp.concat(toAdd);
      });
      return result;
    }
    function unionPhotoArr(localArr, dbArr) {
      var localUrls = new Set((localArr||[]).map(function(p){ return p&&p.url; }).filter(Boolean));
      var toAdd = (dbArr||[]).filter(function(p){ return p&&p.url && !localUrls.has(p.url); });
      return toAdd.length > 0 ? (localArr||[]).concat(toAdd) : (localArr||[]);
    }
    function unionById(localArr, dbArr) {
      if (!dbArr||!dbArr.length) return localArr||[];
      var localIds = new Set((localArr||[]).map(function(x){ return x&&x.id; }).filter(Boolean));
      var toAdd = dbArr.filter(function(x){ return x&&x.id && !localIds.has(x.id); });
      return toAdd.length > 0 ? (localArr||[]).concat(toAdd) : (localArr||[]);
    }
    function unionDocs(localDocs, dbDocs) {
      var seen = new Set((localDocs||[]).map(function(d){ return d&&(d.id||d.url); }).filter(Boolean));
      var toAdd = (dbDocs||[]).filter(function(d){ return d&&(d.id||d.url) && !seen.has(d.id||d.url); });
      return toAdd.length > 0 ? (localDocs||[]).concat(toAdd) : (localDocs||[]);
    }

    // DC
    if (dbData.dc) {
      if (dbData.dc.photos) merged.dc.photos = unionPhotoMap(merged.dc.photos||{}, dbData.dc.photos);
      if (dbData.dc.journeesCloturees) merged.dc.journeesCloturees = unionById(merged.dc.journeesCloturees, dbData.dc.journeesCloturees);
    }
    // AC
    if (dbData.ac) {
      if (dbData.ac.photos) merged.ac.photos = unionPhotoMap(merged.ac.photos||{}, dbData.ac.photos);
      if (dbData.ac.journeesCloturees) merged.ac.journeesCloturees = unionById(merged.ac.journeesCloturees, dbData.ac.journeesCloturees);
    }
    // SAV
    if (dbData.savPhotos) merged.savPhotos = unionPhotoMap(merged.savPhotos||{}, dbData.savPhotos);
    if (dbData.sav) merged.sav = unionById(merged.sav, dbData.sav);
    // Maintenance
    if (dbData.maintenanceVisites) {
      var lv = (merged.maintenanceVisites||[]).slice();
      var localVisiteIds = new Set(lv.map(function(v){ return v&&v.id; }).filter(Boolean));
      (dbData.maintenanceVisites||[]).forEach(function(dbV) {
        if (!dbV) return;
        if (dbV.id && !localVisiteIds.has(dbV.id)) {
          lv.push(dbV); // nouvelle visite d'un autre utilisateur
        } else if (dbV.id) {
          var vi = lv.findIndex(function(v){ return v&&v.id===dbV.id; });
          if (vi >= 0) {
            if (dbV.photos) lv[vi] = Object.assign({}, lv[vi], { photos: unionPhotoMap(lv[vi].photos||{}, dbV.photos) });
            if (dbV.photosGenerales) lv[vi] = Object.assign({}, lv[vi], { photosGenerales: unionPhotoArr(lv[vi].photosGenerales, dbV.photosGenerales) });
          }
        }
      });
      merged.maintenanceVisites = lv;
    }
    // Photos générales
    if (dbData.photosGenerales) merged.photosGenerales = unionPhotoArr(merged.photosGenerales||[], dbData.photosGenerales);
    // Admin docs
    if (dbData.admin && dbData.admin.sections && merged.admin && merged.admin.sections) {
      Object.keys(dbData.admin.sections||{}).forEach(function(sk) {
        if (!merged.admin.sections[sk]) return;
        merged.admin.sections[sk].docs = unionDocs(merged.admin.sections[sk].docs, (dbData.admin.sections[sk]||{}).docs);
      });
    }
    return merged;
  }

  // ── Fonction de sauvegarde unifiée ────────────────────────────────────────
  async function doSave() {
    // Mutex : si une sauvegarde est déjà en cours, marquer et sortir
    if (isSavingRef.current) { pendingSaveRef.current = true; return; }
    isSavingRef.current = true;
    pendingSaveRef.current = false;

    try {
      if (isLoadingData.current) return;
      var d = latestDataRef.current; // snapshot du moment
      var ref = d.meta.ref;
      if (!ref || ref.trim().length < 2) { setSaveStatus("idle"); return; }
      setSaveStatus("saving");

      // ① Upload des base64 vers Storage
      var uploadResult = await uploadAllBase64ToStorage(ref, d);

      // ② Recombiner : texte le plus récent + URLs Storage (evite la perte de saisie)
      var dataToSave;
      if (uploadResult.changed) {
        dataToSave = mergeStorageUrls(latestDataRef.current, uploadResult.data);
        // Mettre à jour le state React pour éviter les re-uploads
        setData(function(prev) { return mergeStorageUrls(prev, uploadResult.data); });
        latestDataRef.current = dataToSave; // anticiper avant le prochain render
      } else {
        dataToSave = latestDataRef.current; // toujours le plus récent
      }

      // ③ Lire la version DB uniquement si quelqu'un d'autre a sauvegardé
      //    depuis notre dernier save. La sauvegarde finale est conditionnelle
      //    sur updated_at pour éviter l'écrasement silencieux multi-utilisateurs.
      var sheetId = currentSheetIdRef.current;
      var ok = false;
      if (sheetId) {
        var needMerge = false;
        var expectedUpdatedAt = lastDbUpdatedAt.current;
        try {
          // Lecture légère : juste updated_at (pas le data complet)
          var headRes = await fetch(
            SUPA_URL + "/rest/v1/feuilles_controle?id=eq." + sheetId + "&select=updated_at",
            { headers: { "apikey": SUPA_KEY, "Authorization": "Bearer " + SUPA_KEY } }
          );
          if (headRes.ok) {
            var headRows = await headRes.json();
            var dbUpdatedAt = headRows && headRows[0] && headRows[0].updated_at;
            // Si DB plus récent que notre dernier save → quelqu'un d'autre a modifié
            if (dbUpdatedAt && lastDbUpdatedAt.current && dbUpdatedAt > lastDbUpdatedAt.current) {
              needMerge = true;
            }
            // Premier save : toujours merger (pour récupérer les données existantes)
            if (!lastDbUpdatedAt.current) needMerge = true;
            if (dbUpdatedAt) expectedUpdatedAt = dbUpdatedAt;
          }
        } catch(e) { /* Si la lecture échoue on sauvegarde quand même */ }

        if (needMerge) {
          var dbRow = await supaLoadById(sheetId);
          if (dbRow && dbRow.data) {
            expectedUpdatedAt = dbRow.updated_at || expectedUpdatedAt;
            var mergedData = mergePhotosFromDB(dataToSave, dbRow.data);
            if (JSON.stringify(mergedData) !== JSON.stringify(dataToSave)) {
              dataToSave = mergedData;
              setData(function(prev) { return mergePhotosFromDB(prev, dbRow.data); });
              latestDataRef.current = mergedData;
            }
          }
        }

        var updateResult = await supaUpdate(sheetId, dataToSave, expectedUpdatedAt);
        if (updateResult.conflict) {
          var latestRow = await supaLoadById(sheetId);
          if (latestRow && latestRow.data) {
            dataToSave = mergePhotosFromDB(dataToSave, latestRow.data);
            setData(function(prev) { return mergePhotosFromDB(prev, latestRow.data); });
            latestDataRef.current = dataToSave;
            updateResult = await supaUpdate(sheetId, dataToSave, latestRow.updated_at);
          }
        }
        ok = !!(updateResult && updateResult.ok);
        if (ok && updateResult.row && updateResult.row.updated_at) {
          // Timestamp serveur réel, pas l'horloge du navigateur.
          lastDbUpdatedAt.current = updateResult.row.updated_at;
        }
      } else {
        var label = "Rapport " + new Date().toLocaleDateString("fr-BE", { day:"2-digit", month:"2-digit", year:"numeric" });
        var created = await supaCreate(ref, label, dataToSave);
        if (created) {
          setCurrentSheetId(created.id);
          currentSheetIdRef.current = created.id;
          if (created.updated_at) lastDbUpdatedAt.current = created.updated_at;
          ok = true;
          sheetId = created.id;
        }
      }

      // ④ Journal d'audit
      if (ok && userRef.current && sheetId) {
        var slim = makeSlimCtrlData(dataToSave);
        var prevSlim = prevDataRef.current;
        var changes = [];
        if (prevSlim) {
          if (JSON.stringify(prevSlim.meta||{}) !== JSON.stringify(dataToSave.meta||{})) changes.push("Infos chantier");
          if (JSON.stringify((prevSlim.dc||{}).items||{}) !== JSON.stringify((dataToSave.dc||{}).items||{})) changes.push("DC");
          if (JSON.stringify((prevSlim.ac||{}).items||{}) !== JSON.stringify((dataToSave.ac||{}).items||{})) changes.push("AC");
          if (JSON.stringify(prevSlim.admin||{}) !== JSON.stringify(dataToSave.admin||{})) changes.push("Admin");
        }
        if (!prevSlim || changes.length) {
          supaCtrlSaveVersion(ref, sheetId, slim, userRef.current, changes.join(" | ") || "Sauvegarde");
          supaCtrlLogAudit(ref, sheetId, userRef.current, "save", { label: changes.join(" | ") || "Sauvegarde" });
        }
        prevDataRef.current = slim;
      }

      setSaveStatus(ok ? "saved" : "error");
      if (ok) {
        setPendingChanges(false);
        setTimeout(function(){ setSaveStatus("idle"); }, 4000);
      } else {
        // Retry automatique après 5s si erreur
        setTimeout(function(){
          setSaveStatus("idle");
          if (latestDataRef.current && latestDataRef.current.meta && latestDataRef.current.meta.ref) {
            saveTimerRef.current = setTimeout(doSave, 5000);
          }
        }, 4000);
      }

    } catch(err) {
      console.error("[doSave] erreur:", err);
      setSaveStatus("error");
      setTimeout(function(){ setSaveStatus("idle"); }, 4000);
    } finally {
      isSavingRef.current = false;
      // Si des modifications sont arrivées pendant la sauvegarde → relancer
      if (pendingSaveRef.current) {
        saveTimerRef.current = setTimeout(doSave, 400);
      }
    }
  }

  // ── Déclencheur unique : surveille TOUTES les modifications ───────────────
  useEffect(function() {
    if (isLoadingData.current) return;
    var ref = data.meta.ref;
    if (!ref || ref.trim().length < 2) { setSaveStatus("idle"); return; }
    setPendingChanges(true); // dès qu'une modification arrive, marquer comme non sauvegardé
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    setSaveStatus("saving");
    saveTimerRef.current = setTimeout(doSave, 800);
    return function() { if (saveTimerRef.current) clearTimeout(saveTimerRef.current); };
  }, [data]); // surveille TOUT — texte ET photos

  // Avertissement navigateur si modifications non sauvegardées + sauvegarde en quittant
  useEffect(function() {
    function flushPendingSave() {
      if (isLoadingData.current) return;
      var d = latestDataRef.current || {};
      var ref = d.meta && d.meta.ref;
      if (!ref || ref.trim().length < 2) return;
      if (saveTimerRef.current) {
        clearTimeout(saveTimerRef.current);
        saveTimerRef.current = null;
      }
      doSave();
    }
    function onVisibilityChange() {
      if (document.visibilityState === "hidden") flushPendingSave();
    }
    function onBeforeUnload(e) {
      flushPendingSave();
      // Si des modifications ne sont pas encore sauvegardées, demander confirmation
      if (pendingChanges || saveTimerRef.current || isSavingRef.current) {
        e.preventDefault();
        e.returnValue = "Des modifications sont en cours de sauvegarde. Voulez-vous vraiment quitter ?";
        return e.returnValue;
      }
    }
    document.addEventListener("visibilitychange", onVisibilityChange);
    window.addEventListener("pagehide", flushPendingSave);
    window.addEventListener("beforeunload", onBeforeUnload);
    return function() {
      document.removeEventListener("visibilitychange", onVisibilityChange);
      window.removeEventListener("pagehide", flushPendingSave);
      window.removeEventListener("beforeunload", onBeforeUnload);
    };
  }, [pendingChanges]);

  // Load from Supabase — charge la feuille la plus récente pour ce ref
  async function loadData(ref, urlTask) {
    if (!ref) return;
    var taskName = urlTask || (data && data.meta && data.meta.nom_tache) || "";
    setLoading(true);
    isLoadingData.current = true;
    try {
      var taskParam = taskName ? "&task=" + encodeURIComponent(taskName) : "";
      window.history.replaceState(null, "", "?ref=" + encodeURIComponent(ref) + taskParam);
    } catch(e) {}
    var list = await supaLoadList(ref);
    if (list.length > 0) {
      var row = await supaLoadById(list[0].id);
      if (row && row.data) {
        setData(function(prev) {
          var merged = deepMerge(makeDefaultData(), row.data);
          // Préserver nom_tache depuis l'URL — Supabase ne le stocke pas
          merged.meta = Object.assign({}, merged.meta, { nom_tache: taskName || prev.meta.nom_tache || "" });
          return merged;
        });
        setCurrentSheetId(list[0].id);
        setCurrentSheetLabel(row.label || "");
        lastDbUpdatedAt.current = row.updated_at || list[0].updated_at || null;
        prevDataRef.current = null;
        if (userRef.current && row.ref) supaCtrlLogAudit(row.ref, list[0].id, userRef.current, "load", {});
      }
    } else {
      // Aucune feuille → auto-prefill depuis le Briefing de Chantier
      setCurrentSheetId(null);
      var chantierData = await supaLoadChantier(ref);
      if (chantierData) {
        var client = chantierData.client || {};
        var weGreen = chantierData.weGreen || {};
        setData(function(prev) {
          var n = deepMerge(makeDefaultData(), prev);
          n.meta = Object.assign({}, n.meta, {
            ref: ref,
            client: client.nom || "",
            adresse: client.adresse || "",
            pm: weGreen.manager || "",
            nom_tache: taskName || prev.meta.nom_tache || ""
          });
          return n;
        });
        setPrefillMsg("✅ Pré-rempli depuis le Briefing — " + (client.nom || ref));
        setTimeout(function(){ setPrefillMsg(""); }, 5000);
      }
    }
    setLoading(false);
    setTimeout(function(){ isLoadingData.current = false; }, 3000);
  }

  // Charger une feuille spécifique par id (depuis SheetSelector)
  async function loadSheetById(id, label) {
    isLoadingData.current = true;
    setLoading(true);
    var row = await supaLoadById(id);
    if (row && row.data) {
      setData(deepMerge(makeDefaultData(), row.data));
      setCurrentSheetId(id);
      setCurrentSheetLabel(label || row.label || "");
      lastDbUpdatedAt.current = row.updated_at || null;
      prevDataRef.current = null; // reset diff tracking
      if (userRef.current && row.ref) supaCtrlLogAudit(row.ref, id, userRef.current, "load", {});
    }
    setLoading(false);
    setTimeout(function(){ isLoadingData.current = false; }, 3000);
  }

  // Restore a version
  function restoreVersion(vData, onDone) {
    if (!vData) { if(onDone) onDone(); return; }
    isLoadingData.current = true;
    setData(deepMerge(makeDefaultData(), vData));
    if (userRef.current && data.meta.ref && currentSheetId)
      supaCtrlLogAudit(data.meta.ref, currentSheetId, userRef.current, "restore", {});
    setTimeout(function(){
      isLoadingData.current = false;
      setShowHistory(false);
      if (onDone) onDone();
    }, 500);
  }

  // Pre-fill from feuilles_chantier (briefing)
  async function prefillFromChantier(ref) {
    var chantierData = await supaLoadChantier(ref);
    if (!chantierData) {
      setPrefillMsg("⚠️ Aucun Briefing trouvé pour cette référence.");
      setTimeout(function(){ setPrefillMsg(""); }, 4000);
      return;
    }
    var client = chantierData.client || {};
    var weGreen = chantierData.weGreen || {};
    setData(function(prev) {
      return Object.assign({}, prev, {
        meta: Object.assign({}, prev.meta, {
          client: client.nom || prev.meta.client,
          adresse: client.adresse || prev.meta.adresse,
          pm: weGreen.manager || prev.meta.pm
        })
      });
    });
    setPrefillMsg("✅ Importé depuis le Briefing — " + (client.nom||ref));
    setTimeout(function(){ setPrefillMsg(""); }, 5000);
  }

  var dcComp = calcDCCompletion(data);
  var acComp = calcACCompletion(data);

  // Mode client (URL ?client=1) ou connecté comme client → AS-Built viewer
  if (CLIENT_MODE || (user && user.type === "client")) return <AsBuiltViewer wgeUser={null} />;

  return (
    <div style={{ minHeight: "100vh", background:"#f4f4f0", fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" }}>
      {/* App Header */}
      <div id="no-print" style={{ background: GREEN, color: WHITE, padding: "10px 14px", display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
        <img src={LOGO_SRC} alt="We Green" style={{ height: 28, borderRadius: 4, flexShrink: 0 }} />
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 700, fontSize: 15 }}>Rapport de Chantier</div>
          <div style={{ fontSize: 11, opacity: 0.8 }}>
            {data.meta.nom_tache ? data.meta.nom_tache : "Rapport de Chantier"}
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
          {/* ── Avertissement Storage manquant ── */}
          {storageWarning && (
            <div style={{ position:"fixed", top:0, left:0, right:0, zIndex:99999,
              background:"#c0392b", color:WHITE, padding:"10px 14px",
              fontSize:12, lineHeight:1.5, display:"flex", gap:10, alignItems:"flex-start" }}>
              <span style={{ fontSize:16, flexShrink:0 }}>⚠️</span>
              <span style={{ flex:1 }}>{storageWarning}</span>
              <button onClick={function(){ setStorageWarning(null); }}
                style={{ background:"rgba(255,255,255,0.2)", border:"none", color:WHITE,
                  borderRadius:4, padding:"2px 8px", cursor:"pointer", flexShrink:0 }}>✕</button>
            </div>
          )}

          {/* ── Statut sauvegarde ── */}
          {saveStatus === "saving" && (
            <span style={{ fontSize:11, opacity:0.8, display:"flex", alignItems:"center", gap:4 }}>
              <span>⏳</span> Sauvegarde…
            </span>
          )}
          {saveStatus === "saved" && !pendingChanges && (
            <span style={{ fontSize:11, color:"#a8e6c0", display:"flex", alignItems:"center", gap:4 }}>
              ✅ Sauvegardé
            </span>
          )}
          {pendingChanges && saveStatus !== "saving" && saveStatus !== "saved" && (
            <span style={{ fontSize:11, color:"#f39c12", fontWeight:700,
              background:"rgba(243,156,18,0.15)", borderRadius:5, padding:"3px 8px",
              display:"flex", alignItems:"center", gap:4 }}>
              ⏳ Non sauvegardé
            </span>
          )}
          {(saveStatus === "idle" || pendingChanges) && data.meta.ref && currentSheetId && (
            <button onClick={function(){
              if (saveTimerRef.current) { clearTimeout(saveTimerRef.current); saveTimerRef.current = null; }
              doSave();
            }}
              title="Forcer une sauvegarde immédiate"
              style={{ fontSize:11, background:"rgba(255,255,255,0.15)", border:"1px solid rgba(255,255,255,0.3)",
                color:WHITE, borderRadius:5, padding:"3px 9px", cursor:"pointer", opacity:0.85 }}>
              💾 Sauvegarder
            </button>
          )}
          {saveStatus === "error" && (
            <div style={{ display:"flex", gap:5, alignItems:"center" }}>
              <span style={{ fontSize:11, color:"#f1a0a0", fontWeight:700 }}>❌ Erreur</span>
              <button onClick={function(){
                setSaveStatus("idle");
                if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
                doSave();
              }} style={{ fontSize:11, color:WHITE, background:"rgba(255,255,255,0.25)",
                border:"1px solid rgba(255,255,255,0.4)", borderRadius:5, padding:"3px 8px", cursor:"pointer" }}>
                🔄 Réessayer
              </button>
              <button onClick={async function(){
                try {
                  var res = await fetch(SUPA_URL + "/rest/v1/feuilles_controle?limit=1",
                    { headers: { "apikey": SUPA_KEY, "Authorization": "Bearer " + SUPA_KEY } });
                  alert(res.ok ? "✅ Connexion Supabase OK. Vérifiez la RLS policy." : "❌ Supabase inaccessible. HTTP " + res.status);
                } catch(e) { alert("❌ Réseau : " + e.message); }
              }} style={{ fontSize:10, color:"#f1a0a0", background:"transparent",
                border:"1px solid rgba(241,160,160,0.4)", borderRadius:5, padding:"2px 6px", cursor:"pointer" }}>
                Tester
              </button>
            </div>
          )}
          {user && (
            <div style={{ display: "flex", alignItems: "center", gap: 5, padding: "3px 9px", background: user.type === "contractor" ? "#fff8f0" : "rgba(255,255,255,0.15)", border: "1px solid "+(user.type === "contractor" ? "#e8c080" : "rgba(255,255,255,0.3)"), borderRadius: 20 }}>
              {user.type === "contractor" && <span style={{ fontSize: 11 }}>🔧</span>}
              {user.type !== "contractor" && <span style={{ fontSize: 11 }}>🌿</span>}
              <span style={{ fontSize: 11, fontWeight: 600, color: user.type === "contractor" ? "#7a4800" : WHITE, maxWidth: 100, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{user.name}</span>
            </div>
          )}
          <button
            onClick={function(){ if(currentSheetId){ setShowHistory(true); } }}
            title={currentSheetId ? "Historique des versions" : "Ouvrez ou créez une feuille pour accéder à l\'historique"}
            style={{ background:"rgba(255,255,255,0.2)", border:"none", color:WHITE,
              borderRadius:6, padding:"5px 10px", fontSize:12,
              cursor: currentSheetId ? "pointer" : "default",
              opacity: currentSheetId ? 1 : 0.45 }}>
            🔄 Historique
          </button>
          {data.meta.ref && (
            <button onClick={function(){ setShowChantier(function(v){ return !v; }); }}
              style={{ background:showChantier?"rgba(255,255,255,0.35)":"rgba(255,255,255,0.2)", border:"none", color:WHITE, borderRadius:6, padding:"5px 10px", fontSize:12, cursor:"pointer" }}>
              📄 Fiche chantier
            </button>
          )}
          {data.meta.ref && (
            <button onClick={function(){ setShowProgress(function(v){ return !v; }); }}
              style={{ background:showProgress?"rgba(255,255,255,0.35)":"rgba(255,255,255,0.2)", border:"none", color:WHITE, borderRadius:6, padding:"5px 10px", fontSize:12, cursor:"pointer" }}>
              📅 Avancement
            </button>
          )}
          <button onClick={function(){ window.print(); }}
            style={{ background: "rgba(255,255,255,0.2)", border: "none", color: WHITE, borderRadius: 6, padding: "5px 10px", fontSize: 12, cursor: "pointer" }}>
            🖨️ Imprimer
          </button>
          {data.meta.ref && (
            <button onClick={function(){
              var url = window.location.origin + window.location.pathname +
                "?asbuilt=1&ref=" + encodeURIComponent(data.meta.ref) +
                (currentSheetId ? "&sheet=" + currentSheetId : "");
              window.open(url, "_blank");
            }}
              title="Ouvrir la page de travail AS-Built (photos, PDFs, impression)"
              style={{ background: "rgba(255,255,255,0.2)", border: "1px solid rgba(255,255,255,0.4)", color: WHITE, borderRadius: 6, padding: "5px 10px", fontSize: 12, cursor: "pointer", fontWeight: 600 }}>
              📋 AS-Built
            </button>
          )}
          {user && (
            <div style={{ position:"relative" }} className="user-menu-wrap">
              <button onClick={function(e){
                var m=e.currentTarget.nextSibling;
                m.style.display=m.style.display==="block"?"none":"block";
              }} style={{ display:"flex", alignItems:"center", gap:6, padding:"5px 10px",
                background: user.type==="contractor" ? "#fff8f0" : "rgba(255,255,255,0.18)",
                border: "1px solid "+(user.type==="contractor" ? "#e8c080" : "rgba(255,255,255,0.35)"),
                borderRadius:20, cursor:"pointer", color: user.type==="contractor" ? "#7a4800" : WHITE }}>
                <span style={{ fontSize:13 }}>{user.type==="contractor" ? "🔧" : "🌿"}</span>
                <span style={{ fontSize:12, fontWeight:600, maxWidth:120, overflow:"hidden",
                  textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{user.name}</span>
                <span style={{ fontSize:9, opacity:0.7 }}>▼</span>
              </button>
              <div style={{ display:"none", position:"absolute", right:0, top:"calc(100% + 6px)",
                background:WHITE, border:"1px solid "+BORDER, borderRadius:8,
                boxShadow:"0 4px 16px rgba(0,0,0,0.12)", zIndex:9999, minWidth:160, overflow:"hidden" }}>
                <div style={{ padding:"10px 14px", borderBottom:"1px solid #f0f0ec" }}>
                  <div style={{ fontSize:12, fontWeight:700, color:"#1a1a1a" }}>{user.name}</div>
                  <div style={{ fontSize:11, color:MUTED }}>{user.email}</div>
                </div>
                <button onClick={function(){ window.wgeSignOut(); }}
                  style={{ width:"100%", padding:"10px 14px", background:"none", border:"none",
                    textAlign:"left", fontSize:13, color:"#c0392b", cursor:"pointer",
                    display:"flex", alignItems:"center", gap:8, fontFamily:"inherit" }}>
                  🚪 Déconnexion
                </button>
              </div>
            </div>
          )}
        </div>
      </div>

      {/* Common header */}
      <HeaderSection data={data} setData={setData} onLoad={loadData} onPrefill={prefillFromChantier} prefillMsg={prefillMsg} loading={loading} />

      {/* Sheet selector */}
      <SheetSelector
        refChantier={data.meta.ref}
        currentId={currentSheetId}
        isWGE={user && (user.type === "wge" || isWGEEmail(user.email))}
        onSelect={function(id, label) { loadSheetById(id, label); }}
        onNew={function(id, label) {
          var fresh = makeDefaultData();
          fresh.meta.ref = data.meta.ref;
          fresh.meta.client = data.meta.client;
          fresh.meta.adresse = data.meta.adresse;
          fresh.meta.pm = data.meta.pm;
          setData(fresh);
          setCurrentSheetId(id);
        }}
        onDelete={function() {
          setCurrentSheetId(null);
          setData(function(prev){
            var fresh = makeDefaultData();
            fresh.meta.ref = prev.meta.ref;
            fresh.meta.client = prev.meta.client;
            fresh.meta.adresse = prev.meta.adresse;
            fresh.meta.pm = prev.meta.pm;
            return fresh;
          });
        }}
      />

      {/* Tabs */}
      {(function(){
        var bothLocked = data.meta.dcLocked && data.meta.acLocked;
        var hasSAVOrMaint = (data.sav||[]).length > 0 || (data.maintenanceVisites||[]).length > 0;
        var showExtraTabs = bothLocked || hasSAVOrMaint;
        var isUserWGE = user && (user.type === "wge" || isWGEEmail(user.email));
        var showAdmin = isUserWGE || bothLocked; // WGE : toujours visible — sous-traitants : seulement si verrouillé
        var adminDocCount = (function(){
          var a = data.admin||{}; var secs = a.sections||{};
          var n = Object.values(secs).reduce(function(acc,s){ return acc + (s&&s.docs?s.docs.length:0); }, 0);
          return n;
        })();
        var tabs = [
          { id: "dc", emoji: "🟦", label: "DC", locked: data.meta.dcLocked, color: DC_COLOR, bg: DC_LIGHT,
            badge: dcComp.total > 0 ? dcComp.pct + "%" : null, nok: dcComp.nokCount },
          { id: "ac", emoji: "🟥", label: "AC", locked: data.meta.acLocked, color: AC_COLOR, bg: AC_LIGHT,
            badge: acComp.total > 0 ? acComp.pct + "%" : null, nok: acComp.nokCount },
        ];
        if (showAdmin) {
          tabs.push({ id: "admin", emoji: "📂", label: "Admin", color: "#8e44ad", bg: "#f5eef8",
            badge: adminDocCount > 0 ? adminDocCount + " doc" + (adminDocCount>1?"s":"") : null, nok: 0 });
        }
        if (showExtraTabs) {
          tabs.push({ id: "sav", emoji: "🔧", label: "SAV", color: "#f39c12", bg: "#fffdf0",
            badge: (data.sav||[]).length > 0 ? (data.sav||[]).length + " inter." : null, nok: 0 });
          tabs.push({ id: "maintenance", emoji: "🔩", label: "Maintenance", color: GREEN, bg: GREEN_LIGHT,
            badge: (data.maintenanceVisites||[]).length > 0 ? (data.maintenanceVisites||[]).length + " visites" : null, nok: 0 });
        }
        return (
          <div id="no-print" style={{ display:"flex", background:WHITE, borderBottom:"2px solid #e8e8e4",
            position:"sticky", top:0, zIndex:100, boxShadow:"0 2px 8px rgba(0,0,0,0.06)", overflowX:"auto" }}>
            {tabs.map(function(t) {
              var isActive = activeTab === t.id;
              return (
                <button key={t.id} onClick={function(){ setActiveTab(t.id); }}
                  style={{ flex: 1, minWidth: 80, padding:"10px 6px",
                    background: isActive ? t.bg : WHITE, color: isActive ? t.color : MUTED,
                    fontWeight: isActive ? 700 : 400, border:"none",
                    borderBottom: isActive ? "3px solid "+t.color : "3px solid transparent",
                    fontSize: 13, cursor:"pointer", fontFamily:"inherit",
                    display:"flex", alignItems:"center", justifyContent:"center",
                    gap:4, flexDirection:"column", whiteSpace:"nowrap" }}>
                  <span style={{ display:"flex", alignItems:"center", gap:4 }}>
                    {t.emoji} {t.label} {t.locked ? "🔒" : ""}
                  </span>
                  <span style={{ display:"flex", gap:4, alignItems:"center" }}>
                    {t.badge && <span style={{ fontSize:10, color:isActive?t.color:MUTED }}>{t.badge}</span>}
                    {t.nok > 0 && <span style={{ background:"#e74c3c", color:WHITE, borderRadius:10,
                      padding:"0px 5px", fontSize:10, fontWeight:700 }}>{t.nok} NOK</span>}
                  </span>
                </button>
              );
            })}
          </div>
        );
      })()}

      {/* Tab content */}
      <div style={{ maxWidth: 800, margin: "0 auto", padding: "14px" }}>
        <div style={{ display: activeTab==="sav" ? "block" : "none" }}>
          <SAVTab data={data} setData={setData} />
        </div>
        <div style={{ display: activeTab==="admin" ? "block" : "none" }}>
          <AdminTab data={data} setData={setData} />
        </div>
        <div style={{ display: activeTab==="maintenance" ? "block" : "none" }}>
          <MaintenanceTab data={data} setData={setData} />
        </div>
        <div style={{ display: activeTab==="dc" ? "block" : "none" }}>
          <DCTab data={data} setData={setData}
            locked={!!data.meta.dcLocked}
            isWGE={user && (user.type === "wge" || isWGEEmail(user.email))}
            onUnlock={function(){ setData(function(prev){ var n=Object.assign({},prev);
              n.meta=Object.assign({},prev.meta,{dcLocked:false}); return n; }); }}
          />
        </div>
        <div style={{ display: activeTab==="ac" ? "block" : "none" }}>
          <ACTab data={data} setData={setData}
            locked={!!data.meta.acLocked}
            isWGE={user && (user.type === "wge" || isWGEEmail(user.email))}
            onUnlock={function(){ setData(function(prev){ var n=Object.assign({},prev);
              n.meta=Object.assign({},prev.meta,{acLocked:false}); return n; }); }}
          />
        </div>
      </div>

      {/* ── Photos générales du chantier ── */}
      <div style={{ maxWidth: 800, margin: "0 auto", padding: "0 14px 24px" }}>
        <div style={{ background: WHITE, border: "1px solid " + BORDER, borderRadius: 10, overflow: "hidden" }}>
          <div style={{ background: "#f8f4ff", borderBottom: "1px solid #e0d5f5", padding: "10px 14px",
            display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 18 }}>🏗️</span>
            <div>
              <div style={{ fontWeight: 700, fontSize: 13, color: "#6c3483" }}>Photos générales du chantier</div>
              <div style={{ fontSize: 11, color: MUTED, marginTop: 1 }}>
                Livraisons de matériel, état général, photos diverses non rattachées à une section DC ou AC
              </div>
            </div>
          </div>
          <div style={{ padding: "12px 14px" }}>
            <PhotoZone catKey="photos_generales" label="📷 Photos générales"
              items={data.photosGenerales||[]} hiRes={true} allSections={[]}
              onAdd={function(arr){ setData(function(prev){ return Object.assign({},prev,{photosGenerales:(prev.photosGenerales||[]).concat(arr)}); }); }}
              onDelete={function(i){ if(!window.confirm("Supprimer cette photo ?")) return;
                setData(function(prev){ return Object.assign({},prev,{photosGenerales:(prev.photosGenerales||[]).filter(function(_,j){ return j!==i; })}); }); }}
              onUpdate={function(i,u){ setData(function(prev){ var a=(prev.photosGenerales||[]).slice(); a[i]=u; return Object.assign({},prev,{photosGenerales:a}); }); }}
              onReorder={function(f,t){ setData(function(prev){ var a=(prev.photosGenerales||[]).slice(); var it=a.splice(f,1)[0]; a.splice(t,0,it); return Object.assign({},prev,{photosGenerales:a}); }); }}
              onReceiveCross={function(){}} onMoveTo={function(){}}
            />
          </div>
        </div>
      </div>

      {/* Debug info */}
      {!data.meta.ref && (
        <div id="no-print" style={{ textAlign: "center", padding: "20px 14px", color: MUTED, fontSize: 13 }}>
          ℹ️ Saisissez une référence chantier pour activer la sauvegarde automatique
        </div>
      )}

      {/* History panel */}
      {showHistory && data.meta.ref && (
        <>
          <div onClick={function(){ setShowHistory(false); }}
            style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.25)", zIndex:9989 }} />
          <HistoryPanel
            refChantier={data.meta.ref}
            sheetId={currentSheetId}
            sheetLabel={currentSheetLabel}
            onRestore={restoreVersion}
            onClose={function(){ setShowHistory(false); }}
          />
        </>
      )}

      {/* Chantier panel */}
      {showChantier && data.meta.ref && (
        <>
          <div onClick={function(){ setShowChantier(false); }}
            style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.20)", zIndex:9989 }} />
          <ChantierPanel
            refChantier={data.meta.ref}
            onClose={function(){ setShowChantier(false); }}
          />
        </>
      )}

      {/* Progress panel */}
      {showProgress && data.meta.ref && (
        <>
          <div onClick={function(){ setShowProgress(false); }}
            style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.20)", zIndex:9989 }} />
          <ProgressPanel
            data={data}
            onClose={function(){ setShowProgress(false); }}
          />
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
