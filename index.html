            {(function() {
              // Nouvelle structure : chData.sites[].pvInstallations[].tech + .electrical
              // Ancienne structure : chData.installations[].tech (électrique dans tech aussi)
              var allBlocks = [];

              // Nouvelle structure : sites[]
              if (chData.sites && chData.sites.length > 0) {
                chData.sites.forEach(function(site, si) {
                  var elec  = site.electrical || {};
                  var pvArr = site.pvInstallations || [];
                  pvArr.forEach(function(inst, ii) {
                    var tech = inst && inst.tech;
                    if (tech) allBlocks.push({ tech:tech, elec:elec, si:si, ii:ii, total: pvArr.length, nbSites: chData.sites.length });
                  });
                });
              }

              // Ancienne structure : installations[] (fallback)
              if (allBlocks.length === 0 && chData.installations && chData.installations.length > 0) {
                chData.installations.forEach(function(inst, ii) {
                  var tech = inst && inst.tech;
                  if (tech) allBlocks.push({ tech:tech, elec:tech, si:0, ii:ii, total: chData.installations.length, nbSites: 1 });
                });
              }

              if (allBlocks.length === 0) return null;

              return allBlocks.map(function(b, idx) {
                var tech = b.tech, elec = b.elec;
                var pfx = (b.nbSites > 1 ? " — Site "+(b.si+1) : "") + (b.total > 1 ? " — Inst. "+(b.ii+1) : "");
                var rows = [
                  tech.panneaux && tech.panneaux.nbr && ["Panneaux",
                    [tech.panneaux.nbr+" pcs", tech.panneaux.type, tech.panneaux.kWc&&tech.panneaux.kWc+" kWc"].filter(Boolean).join(" — ")],
                  tech.panneaux2 && tech.panneaux2.active && (tech.panneaux2.type||tech.panneaux2.nbr) && ["Panneaux 2",
                    [tech.panneaux2.nbr&&tech.panneaux2.nbr+" pcs", tech.panneaux2.type, tech.panneaux2.kWc&&tech.panneaux2.kWc+" kWc"].filter(Boolean).join(" — ")],
                  tech.onduleurs && tech.onduleurs.length > 0 && ["Onduleur(s)",
                    tech.onduleurs.map(function(o){ return [o.type, o.kva&&o.kva+" kVA"].filter(Boolean).join(" "); }).filter(Boolean).join(", ")||"—"],
                  tech.batterie && tech.batterie.inclus && ["Batterie",
                    tech.batterie.inclus==="OUI"
                      ? [tech.batterie.qty&&tech.batterie.qty+"×", tech.batterie.kwh&&tech.batterie.kwh+" kWh", tech.batterie.type].filter(Boolean).join(" ")||"OUI"
                      : tech.batterie.inclus],
                  tech.borne && tech.borne.inclus==="OUI" && ["Borne recharge",
                    [tech.borne.qty&&tech.borne.qty+"×", tech.borne.type].filter(Boolean).join(" ")||"OUI"],
                  elec.amperageDisj && ["Disj. général", elec.amperageDisj+" A"],
                  elec.compteur && (elec.compteur.serie||elec.compteur.ean) && ["Compteur",
                    [elec.compteur.serie&&"N° "+elec.compteur.serie, elec.compteur.ean&&"EAN: "+elec.compteur.ean].filter(Boolean).join(" — ")],
                  elec.reseau && ["Réseau", elec.reseau],
                ].filter(Boolean);

                if (rows.length === 0) return null;
                return (
                  <Section key={idx} id={"tech"+idx} title={"🔧 Informations techniques"+pfx}>
                    <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                      <tbody>
                        {rows.map(function(r, ri){ return (
                          <tr key={ri} style={{ borderBottom:"1px solid #f0f0ec" }}>
                            <td style={{ padding:"5px 10px 5px 0", fontWeight:600, color:"#555", whiteSpace:"nowrap", verticalAlign:"top" }}>{r[0]}</td>
                            <td style={{ padding:"5px 0", color:"#1a1a1a" }}>{r[1]}</td>
                          </tr>
                        ); })}
                      </tbody>
                    </table>
                  </Section>
                );
              });
            })()}
          </div>
        )}
      </div>
    </div>
  );
}

// ── SheetSelector ────────────────────────────────────────────────────────────
// Les "sections" sont des séparateurs visuels stockés en localStorage
// Format order: [ {type:"sheet",id:82}, {type:"section",id:"sec_...",label:"..."}, ... ]

function getSheetOrder(ref) {
  try { return JSON.parse(localStorage.getItem("wge_sheet_order_" + ref) || "[]"); } catch(e) { return []; }
}
function saveSheetOrder(ref, order) {
  try { localStorage.setItem("wge_sheet_order_" + ref, JSON.stringify(order)); } catch(e) {}
}
function applySortOrder(sheets, ref) {
  var order = getSheetOrder(ref);
  if (!order.length) return sheets.map(function(s){ return {type:"sheet", data:s}; });
  var result = [];
  order.forEach(function(item) {
    if (item.type === "section") {
      result.push(item);
    } else {
      var s = sheets.find(function(sh){ return sh.id === item.id; });
      if (s) result.push({ type:"sheet", data:s });
    }
  });
  // Feuilles pas encore dans l'ordre → en fin
  sheets.forEach(function(s) {
    var inOrder = order.some(function(o){ return o.type==="sheet" && o.id===s.id; });
    if (!inOrder) result.push({ type:"sheet", data:s });
  });
  return result;
}

function SheetSelector({ refChantier, currentId, onSelect, onNew, onDelete, isWGE }) {
  var [sheets, setSheets]       = useState([]);
  var [ordered, setOrdered]     = useState([]); // [{type:"sheet"|"section", data?:..., label?:..., id?:...}]
  var [loadingList, setLoading] = useState(false);
  var [newLabel, setNewLabel]   = useState("");
  var [creating, setCreating]   = useState(false);
  var [showNew, setShowNew]     = useState(false);
  var [editingId, setEditingId] = useState(null);
  var [editVal, setEditVal]     = useState("");
  var [menuOpenId, setMenuOpenId]     = useState(null); // ... sur feuille
  var [headerMenuOpen, setHeaderMenu] = useState(false); // ... sur header
  var [addSecLabel, setAddSecLabel]   = useState("");
  var [showAddSec, setShowAddSec]     = useState(false);
  var [dragOver, setDragOver]   = useState(null);
  var dragSrc = useRef(null);

  useEffect(function() {
    function close(e) {
      setMenuOpenId(null);
      setHeaderMenu(false);
    }
    document.addEventListener("click", close);
    return function() { document.removeEventListener("click", close); };
  }, []);

  useEffect(function() {
    if (!refChantier) { setSheets([]); setOrdered([]); return; }
    setLoading(true);
    supaLoadList(refChantier).then(function(rows) {
      setSheets(rows || []);
      // Charger l'ordre depuis Supabase (puis fallback localStorage)
      supaLoadOrder(refChantier).then(function(orderRow) {
        if (orderRow && orderRow.data && orderRow.data.order && orderRow.data.order.length > 0) {
          // Supabase a l'ordre → mettre à jour localStorage et appliquer
          saveSheetOrder(refChantier, orderRow.data.order);
          var result = [];
          orderRow.data.order.forEach(function(item) {
            if (item.type === "section") { result.push(item); }
            else {
              var s = (rows||[]).find(function(sh){ return sh.id === item.id; });
              if (s) result.push({ type:"sheet", data:s });
            }
          });
          (rows||[]).forEach(function(s) {
            var inOrder = orderRow.data.order.some(function(o){ return o.type==="sheet" && o.id===s.id; });
            if (!inOrder) result.push({ type:"sheet", data:s });
          });
          setOrdered(result);
        } else {
          // Fallback localStorage — et migration automatique vers Supabase
          var localOrder = getSheetOrder(refChantier);
          setOrdered(applySortOrder(rows || [], refChantier));
          // Si localStorage a des données (sections déjà créées avant cette version),
          // les migrer automatiquement vers Supabase pour que les clients puissent les voir
          if (localOrder && localOrder.length > 0) {
            supaUpsertOrder(refChantier, localOrder);
          }
        }
        setLoading(false);
      });
    });
  }, [refChantier]);

  function persistOrder(newOrdered) {
    setOrdered(newOrdered);
    var flat = newOrdered.map(function(o){
      return o.type === "section"
        ? { type:"section", id:o.id, label:o.label }
        : { type:"sheet", id:o.data.id };
    });
    saveSheetOrder(refChantier, flat);        // localStorage (rapide, local)
    supaUpsertOrder(refChantier, flat);       // Supabase (partageable avec clients)
  }

  function addSection(label) {
    if (!label.trim()) return;
    var item = { type:"section", id:"sec_"+Date.now(), label:label.trim() };
    var newOrd = ordered.concat([item]);
    persistOrder(newOrd);
    setAddSecLabel(""); setShowAddSec(false);
  }

  function renameSection(secId, newLabel) {
    var newOrd = ordered.map(function(o){
      return (o.type==="section" && o.id===secId) ? Object.assign({},o,{label:newLabel}) : o;
    });
    persistOrder(newOrd);
  }

  function deleteSection(secId) {
    if (!window.confirm("Supprimer cette section ?")) return;
    persistOrder(ordered.filter(function(o){ return !(o.type==="section" && o.id===secId); }));
  }

  function reorder(from, to) {
    var arr = ordered.slice();
    var item = arr.splice(from, 1)[0];
    arr.splice(to, 0, item);
    persistOrder(arr);
  }

  function startEdit(sheet) { setEditingId(sheet.id); setEditVal(sheet.label || ""); }
  function saveEdit(id) {
    var val = editVal.trim();
    if (!val) { setEditingId(null); return; }
    supaUpdateSheetLabel(id, val).then(function(ok) {
      if (ok) {
        var upd = function(arr){ return arr.map(function(o){
          if (o.type==="sheet" && o.data && o.data.id===id) return Object.assign({},o,{data:Object.assign({},o.data,{label:val})});
          return o;
        }); };
        setSheets(function(l){ return l.map(function(s){ return s.id===id?Object.assign({},s,{label:val}):s; }); });
        setOrdered(upd);
      }
    });
    setEditingId(null);
  }

  function handleCreate() {
    if (!newLabel.trim() || creating) return;
    setCreating(true);
    var emptyData = makeDefaultData();
    emptyData.meta.ref = refChantier;
    supaCreate(refChantier, newLabel.trim(), emptyData).then(function(created) {
      if (created) {
        var newSheet = created;
        setSheets(function(l){ return [newSheet].concat(l); });
        var newOrd = [{ type:"sheet", data:newSheet }].concat(ordered);
        persistOrder(newOrd);
        setShowNew(false); setNewLabel("");
        onNew(created.id, newLabel.trim());
      }
      setCreating(false);
    });
  }

  function fmtDate(iso) {
    if (!iso) return "";
    var d = new Date(iso);
    return d.toLocaleDateString("fr-BE",{day:"2-digit",month:"2-digit",year:"numeric"})+" "+
           d.toLocaleTimeString("fr-BE",{hour:"2-digit",minute:"2-digit"});
  }

  if (!refChantier) return null;

  return (
    <div style={{ background:WHITE, borderBottom:"1px solid #e8e8e4", padding:"10px 14px" }}>
      {/* Header row */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
        <div style={{ fontWeight:700, fontSize:12, color:GREEN, textTransform:"uppercase", letterSpacing:"0.06em" }}>
          📋 Rapports de chantier — {refChantier}
          {loadingList && <span style={{ fontWeight:400, color:MUTED, marginLeft:8 }}>⏳</span>}
          {!loadingList && sheets.length>0 && <span style={{ fontWeight:400, color:MUTED, marginLeft:6 }}>({sheets.length})</span>}
        </div>
        {isWGE && (
          <div style={{ display:"flex", gap:6, alignItems:"center" }}>
            <button onClick={function(){ setShowNew(function(v){return !v;}); setNewLabel(""); }}
              style={{ background:GREEN, color:WHITE, border:"none", borderRadius:7,
                padding:"6px 13px", fontSize:12, fontWeight:700, cursor:"pointer" }}>
              + Nouvelle feuille
            </button>
            {/* ⋯ header menu */}
            <div style={{ position:"relative" }} onClick={function(e){ e.stopPropagation(); }}>
              <button onClick={function(e){ e.stopPropagation(); setHeaderMenu(function(v){return !v;}); }}
                style={{ background:"#f0f0ec", border:"1px solid #e0e0d8", borderRadius:7,
                  padding:"6px 10px", fontSize:15, cursor:"pointer", color:"#555", lineHeight:1 }}>
                ⋯
              </button>
              {headerMenuOpen && (
                <div style={{ position:"absolute", right:0, top:"100%", zIndex:1000, marginTop:4,
                  background:WHITE, border:"1px solid #e0e0d8", borderRadius:8,
                  boxShadow:"0 4px 16px rgba(0,0,0,0.12)", minWidth:190, overflow:"hidden" }}>
                  <button onClick={function(){ setShowAddSec(true); setHeaderMenu(false); setAddSecLabel(""); }}
                    style={{ display:"block", width:"100%", textAlign:"left", padding:"10px 14px",
                      border:"none", background:"none", cursor:"pointer", fontSize:13, color:"#1a1a1a" }}
                    onMouseOver={function(e){ e.currentTarget.style.background="#f5f5f2"; }}
                    onMouseOut={function(e){ e.currentTarget.style.background="none"; }}>
                    📁 Ajouter une section
                  </button>
                </div>
              )}
            </div>
          </div>
        )}
      </div>

      {/* Nouvelle feuille form */}
      {showNew && (
        <div style={{ background:"#f0f7f2", borderRadius:8, padding:"10px 12px", marginBottom:8,
          display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
          <input type="text" value={newLabel}
            onChange={function(e){ setNewLabel(e.target.value); }}
            onKeyDown={function(e){ if(e.key==="Enter") handleCreate(); }}
            placeholder="Nom de la feuille…" style={{ flex:1, minWidth:200, fontSize:13 }} autoFocus />
          <button onClick={handleCreate} disabled={!newLabel.trim()||creating}
            style={{ background:creating||!newLabel.trim()?"#aaa":GREEN, color:WHITE, border:"none",
              borderRadius:7, padding:"7px 16px", fontSize:13, fontWeight:700, cursor:"pointer" }}>
            {creating?"⏳":"✓ Créer"}
          </button>
          <button onClick={function(){ setShowNew(false); }}
            style={{ background:"#e8e8e4", border:"none", borderRadius:7, padding:"7px 12px", fontSize:13, cursor:"pointer" }}>
            Annuler
          </button>
        </div>
      )}

      {/* Ajouter section form */}
      {showAddSec && (
        <div style={{ background:"#f5f0fa", borderRadius:8, padding:"10px 12px", marginBottom:8,
          display:"flex", gap:8, alignItems:"center", flexWrap:"wrap", border:"1px solid #d7bde2" }}>
          <span style={{ fontSize:12, color:"#8e44ad", fontWeight:600 }}>📁 Nom de la section :</span>
          <input type="text" value={addSecLabel}
            onChange={function(e){ setAddSecLabel(e.target.value); }}
            onKeyDown={function(e){ if(e.key==="Enter") addSection(addSecLabel); }}

            style={{ background:"#e8e8e4", border:"none", borderRadius:7, padding:"7px 12px", fontSize:13, cursor:"pointer" }}>

          </button>
        </div>
      )}

      {!loadingList && sheets.length===0 && !showNew && (
        <div style={{ fontSize:12, color:MUTED, fontStyle:"italic" }}>

        </div>
      )}

      {isWGE && ordered.length>1 && (
        <div style={{ fontSize:10, color:MUTED, marginBottom:6, fontStyle:"italic" }}>

      {/* Ordered list of sheets + sections */}
      {ordered.length>0 && (
        <div style={{ display:"flex", flexWrap:"wrap", gap:6, alignItems:"center" }}>
          {ordered.map(function(item, idx) {

            // ── Section divider ──
            if (item.type === "section") {
              var isSectionDragOver = dragOver === idx;
              return (
                <div key={item.id}
                  onDragOver={function(e){ e.preventDefault(); setDragOver(idx); }}
                  onDragLeave={function(){ setDragOver(null); }}
                  onDrop={function(e){ e.preventDefault(); setDragOver(null);
                    if (dragSrc.current !== null && dragSrc.current !== idx) reorder(dragSrc.current, idx);
                    dragSrc.current = null; }}
                  style={{ width:"100%", display:"flex", alignItems:"center",
                    gap:6, margin:"6px 0 2px",
                    background: isSectionDragOver ? "#f5eef8" : "transparent",
                    borderRadius: isSectionDragOver ? 6 : 0,
                    outline: isSectionDragOver ? "2px dashed #8e44ad" : "none",
                    transition:"background 0.1s" }}>
                  {editingId === item.id ? (
                    <input type="text" value={editVal}
                      onChange={function(e){ setEditVal(e.target.value); }}
                      onKeyDown={function(e){ if(e.key==="Enter"){ renameSection(item.id, editVal); setEditingId(null); } if(e.key==="Escape") setEditingId(null); }}
                      onBlur={function(){ renameSection(item.id, editVal); setEditingId(null); }}
                      style={{ flex:1, fontSize:11, fontWeight:700, color:"#8e44ad",
                        border:"1px solid #8e44ad", borderRadius:4, padding:"2px 7px" }}
                      autoFocus onClick={function(e){ e.stopPropagation(); }} />
                  ) : (
                    <div style={{ flex:1, fontSize:11, fontWeight:700, color:"#8e44ad",
                      textTransform:"uppercase", letterSpacing:"0.08em", display:"flex", alignItems:"center", gap:6 }}>
                      <span style={{ flex:1, borderTop:"1.5px solid #d7bde2", paddingLeft:6 }}>{item.label}</span>
                    </div>
                  )}
                  {isWGE && editingId !== item.id && (
                    <div style={{ display:"flex", gap:3 }}>
                      <button onClick={function(){ setEditingId(item.id); setEditVal(item.label||""); }}
                        style={{ background:"none", border:"none", color:"#c39bd3", cursor:"pointer", fontSize:11, padding:"0 4px" }}>✏️</button>
                      <button onClick={function(){ deleteSection(item.id); }}
                        style={{ background:"none", border:"none", color:"#f1948a", cursor:"pointer", fontSize:11, padding:"0 4px" }}>🗑</button>
                    </div>
                  )}
                </div>
              );
            }

            // ── Sheet chip ──
            var sheet = item.data;
            if (!sheet) return null;
            var isCurrent = sheet.id === currentId;
            var isEditing = editingId === sheet.id;
            var isDragOver = dragOver === idx;

            return (
              <div key={sheet.id}
                draggable={isWGE && !isEditing}
                onDragStart={function(){ dragSrc.current = idx; }}
                onDragOver={function(e){ e.preventDefault(); setDragOver(idx); }}
                onDragLeave={function(){ setDragOver(null); }}
                onDrop={function(e){ e.preventDefault(); setDragOver(null);
                  if(dragSrc.current!==null && dragSrc.current!==idx) reorder(dragSrc.current, idx);
                  dragSrc.current=null; }}
                onDragEnd={function(){ setDragOver(null); dragSrc.current=null; }}
                onClick={function(){ if(!isCurrent && !isEditing) onSelect(sheet.id, sheet.label); }}
                style={{
                  background: isCurrent?GREEN:isDragOver?GREEN_LIGHT:"#f8f8f6",
                  border:"1.5px solid "+(isCurrent?GREEN:isDragOver?GREEN:"#e0e0d8"),
                  borderRadius:8, padding:"7px 11px",
                  cursor:isEditing?"default":isCurrent?"default":"pointer",
                  display:"flex", alignItems:"center", gap:8,
                  transition:"background 0.12s, border 0.12s"
                }}>
                {isWGE && !isEditing && (
                  <span style={{ color:isCurrent?"rgba(255,255,255,0.5)":MUTED, fontSize:12, cursor:"grab", flexShrink:0 }}>⠿</span>
                )}
                <div style={{ minWidth:0 }}>
                  {isEditing ? (
                    <input type="text" value={editVal}
                      onChange={function(e){ setEditVal(e.target.value); }}
                      onKeyDown={function(e){ if(e.key==="Enter") saveEdit(sheet.id); if(e.key==="Escape") setEditingId(null); }}
                      onBlur={function(){ saveEdit(sheet.id); }}
                      style={{ fontSize:13, fontWeight:700, border:"1px solid "+GREEN,

                      autoFocus onClick={function(e){ e.stopPropagation(); }} />

                    <div style={{ fontWeight:700, fontSize:13, color:isCurrent?WHITE:"#1a1a1a",

                    </button>
                    {menuOpenId === sheet.id && (
                      <div style={{ position:"absolute", right:0, top:"100%", zIndex:1000,
                        background:WHITE, border:"1px solid #e0e0d8", borderRadius:8,

                            setMenuOpenId(null);

                            if (!window.confirm("⚠️ CONFIRMATION FINALE\n\nSupprimer définitivement :\n\"" + n + "\"\n\nToutes les données seront perdues. Continuer ?")) return;
                            supaDeleteSheet(sheet.id).then(function(ok) {

// ── CloturJourneeBlock ────────────────────────────────────────────────────────
// Section "Clôture de journée" — affichée au-dessus de la clôture de chantier.
// Auteur = utilisateur connecté (auto), heure = moment de confirmation (auto),
// date = aujourd'hui par défaut (modifiable), commentaire libre.
function CloturJourneeBlock({ tab, tabColor, journees, setJournees, locked }) {
  var [showForm, setShowForm] = useState(false);
  var [expanded, setExpanded] = useState(null);
  var [formDate, setFormDate] = useState(function(){ return new Date().toISOString().slice(0,10); });
  var [formNote, setFormNote] = useState("");

  var sortedJournees = (journees||[]).slice().sort(function(a,b){ return b.date > a.date ? 1 : -1; });

  // Récupère le nom de l'utilisateur connecté
  function getCurrentUser() {
    try { var u=JSON.parse(localStorage.getItem("wge_user")||"{}"); return u.name||"Inconnu"; } catch(e){ return "Inconnu"; }
  }

  function openForm() {
    setFormDate(new Date().toISOString().slice(0,10));
    setFormNote("");
    setShowForm(true);
    setExpanded(null);
  }

  function submitJournee() {
    var now = new Date();
    var entry = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      date: formDate,
      heure: now.toTimeString().slice(0,5),
      auteur: getCurrentUser(),
      note: formNote.trim(),
      tab: tab
    };
    setJournees(function(prev){ return (prev||[]).concat([entry]); });
    setShowForm(false);
  }

  function fmtDate(iso) {
    var d=new Date(iso+"T12:00:00");
    return d.toLocaleDateString("fr-BE",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});
  }

  var currentUser = getCurrentUser();

  return (
    <div id="no-print" style={{ marginBottom: 8 }}>
      <div style={{ background:"#fff8e8", border:"2px solid #f39c12", borderRadius:10, overflow:"hidden", marginBottom:8 }}>

        {/* ── Bandeau titre ── */}
        <div style={{ background:"#f39c12", padding:"10px 14px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div style={{ fontWeight:700, fontSize:13, color:"#fff", display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ fontSize:18 }}>📅</span>
            Clôture de journée
            {sortedJournees.length > 0 && (
              <span style={{ background:"rgba(255,255,255,0.25)", borderRadius:12, padding:"1px 9px", fontSize:12 }}>
                {sortedJournees.length} journée{sortedJournees.length>1?"s":""}
              </span>
            )}
          </div>
          {!locked && !showForm && (
            <button onClick={openForm}
              style={{ background:"#fff", border:"none", borderRadius:7, padding:"6px 14px",
                fontSize:12, fontWeight:700, color:"#f39c12", cursor:"pointer", whiteSpace:"nowrap" }}>
              ➕ Clôturer la journée
            </button>
          )}
        </div>

        {/* ── Sous-titre ── */}
        <div style={{ padding:"7px 14px", fontSize:12, color:"#856404",
          borderBottom: (sortedJournees.length>0||showForm) ? "1px solid #fdd98a" : "none" }}>
          À compléter <strong>en fin de journée</strong> — votre clôture sera visible dans la feuille d'avancement.
        </div>

        {/* ── Formulaire ── */}
        {showForm && (
          <div style={{ padding:"14px", background:"#fffdf0",
            borderBottom: sortedJournees.length>0 ? "1px solid #fdd98a" : "none" }}>

            {/* Info auto (lecture seule) */}
            <div style={{ background:"#fff", border:"1px solid #fdd98a", borderRadius:8,
              padding:"9px 12px", marginBottom:12, display:"flex", flexWrap:"wrap", gap:16 }}>
              <div>
                <div style={{ fontSize:11, color:MUTED, fontWeight:500, marginBottom:2 }}>Chef d'équipe</div>
                <div style={{ fontSize:13, fontWeight:700, color:"#1a1a1a" }}>👤 {currentUser}</div>
              </div>
              <div>
                <div style={{ fontSize:11, color:MUTED, fontWeight:500, marginBottom:2 }}>Heure de clôture</div>
                <div style={{ fontSize:13, fontWeight:700, color:"#1a1a1a" }}>
                  🕐 Enregistrée à la confirmation
                </div>
              </div>
            </div>

            {/* Date (modifiable) */}
            <div style={{ marginBottom:12 }}>
              <label style={{ fontSize:12, color:MUTED, fontWeight:500, marginBottom:4, display:"block" }}>
                Date de la journée
                <span style={{ fontWeight:400, marginLeft:6, color:"#b8860b" }}>(aujourd'hui par défaut, modifiable)</span>
              </label>
              <input type="date" value={formDate} onChange={function(e){ setFormDate(e.target.value); }}
                style={{ width:"100%", maxWidth:240 }} />
            </div>

            {/* Commentaire */}
            <div style={{ marginBottom:14 }}>
              <label style={{ fontSize:12, color:MUTED, fontWeight:500, marginBottom:4, display:"block" }}>
                Commentaire de fin de journée <span style={{ fontWeight:400 }}>(optionnel)</span>
              </label>
              <textarea value={formNote} onChange={function(e){ setFormNote(e.target.value); }}
                placeholder="Avancement du chantier, points en suspens, remarques particulières…"
                style={{ width:"100%", minHeight:80, resize:"vertical" }} />
            </div>

            <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
              <button onClick={submitJournee}
                style={{ background:"#f39c12", color:"#fff", border:"none", borderRadius:8,
                  padding:"11px 22px", fontSize:13, fontWeight:700, cursor:"pointer",
                  display:"inline-flex", alignItems:"center", gap:7 }}>
                ✅ Confirmer la clôture
              </button>
              <button onClick={function(){ setShowForm(false); }}
                style={{ background:"none", color:MUTED, border:"1px solid "+BORDER, borderRadius:8,
                  padding:"11px 16px", fontSize:13, cursor:"pointer" }}>
                Annuler
              </button>
            </div>
          </div>
        )}

        {/* ── Liste des journées ── */}
        {sortedJournees.length > 0 && (
          <div style={{ padding:"8px 14px 12px" }}>
            {sortedJournees.map(function(j) {
              var isOpen = expanded === j.id;
              return (
                <div key={j.id} style={{ background:"#fff", border:"1px solid #fdd98a",
                  borderRadius:8, marginBottom:6, overflow:"hidden" }}>
                  <div onClick={function(){ setExpanded(isOpen ? null : j.id); }}
                    style={{ padding:"9px 12px", cursor:"pointer", display:"flex",
                      alignItems:"center", justifyContent:"space-between",
                      background: isOpen ? "#fffbf0" : "#fff", userSelect:"none" }}>
                    <div>
                      <div style={{ fontWeight:700, fontSize:12, color:"#856404", textTransform:"capitalize" }}>
                        📅 {fmtDate(j.date)} {j.heure ? "— "+j.heure : ""}
                      </div>
                      <div style={{ fontSize:11, color:MUTED, marginTop:2 }}>
                        👤 {j.auteur}
                        {j.note && <span style={{ marginLeft:10, fontStyle:"italic" }}>
                          "{j.note.slice(0,50)}{j.note.length>50?"…":""}"
                        </span>}
                      </div>
                    </div>
                    <div style={{ display:"flex", alignItems:"center", gap:8, flexShrink:0 }}>
                      {!locked && (
                        <button onClick={function(e){ e.stopPropagation();
                          if(!window.confirm("Supprimer cette clôture de journée ?")) return;
                          setJournees(function(prev){ return prev.filter(function(x){ return x.id!==j.id; }); }); }}
                          style={{ background:"#fdecea", border:"1px solid #f1948a", color:"#c0392b",
                            borderRadius:5, padding:"3px 8px", fontSize:11, cursor:"pointer", minHeight:0 }}>
                          🗑
                        </button>
                      )}
                      <span style={{ color:MUTED, fontSize:11,
                        transform:isOpen?"rotate(180deg)":"none", transition:"transform 0.2s" }}>▼</span>
                    </div>
                  </div>
                  {isOpen && (
                    <div style={{ padding:"10px 12px", borderTop:"1px solid #fdd98a", background:"#fffdf8" }}>
                      {j.note ? (
                        <div style={{ fontSize:12, color:"#1a1a1a", lineHeight:1.6,
                          background:"#fff8e8", borderRadius:6, padding:"8px 10px",
                          borderLeft:"3px solid #f39c12", whiteSpace:"pre-wrap" }}>
                          {j.note}
                        </div>
                      ) : (
                        <div style={{ fontSize:12, color:MUTED, fontStyle:"italic" }}>Aucun commentaire.</div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {sortedJournees.length === 0 && !showForm && (
          <div style={{ padding:"12px 14px", fontSize:12, color:MUTED, fontStyle:"italic", textAlign:"center" }}>
            Aucune journée clôturée pour l'instant
          </div>
        )}
      </div>
    </div>
  );
}

// ── generateAsBuilt ──────────────────────────────────────────────────────────
// ── Helpers AS-Built partagés (global scope) ────────────────────────────────
function buildPhotoLabel(catKey) {
  if (/^ac_app_(\d+)$/.test(catKey))    return "Appareil / Onduleur / Borne " + (parseInt(catKey.replace("ac_app_",""))+1);
  if (/^ac_tab_(\d+)$/.test(catKey))    return "Tableau électrique " + (parseInt(catKey.replace("ac_tab_",""))+1);
  if (/^string_ph_(\d+)$/.test(catKey)) return "String " + (parseInt(catKey.replace("string_ph_",""))+1);
  var m = { ac_pre_general:"Pré-chantier — Vue générale", ac_pre_tgbt:"Pré-chantier — TGBT",
    ac_pre_compteur:"Pré-chantier — Compteur", ac_post_tubages:"Post-chantier — Tubages",
    ac_post_tgbt:"Post-chantier — TGBT", ac_config_ph:"Configuration onduleur",
    ac_schema_ph:"Schéma électrique", mesure_terre_ph:"Mesure de terre" };
  if (m[catKey]) return m[catKey];
  return catKey.replace(/^(ac|dc)_/,"").replace(/_ph$/,"").replace(/_/g," ");
}
function collectAllSectionPhotos(photosMap, sectionDefs, tabLabel) {
  var sections = []; var coveredKeys = new Set();
  (sectionDefs||[]).forEach(function(s) {
    (s.photoCats||[]).forEach(function(c) {
      coveredKeys.add(c.key);
      var photos = ((photosMap||{})[c.key]||[]).filter(function(p){ return p&&p.url; });
      if (photos.length > 0)
        sections.push({ tab:tabLabel, section:s.label.replace(/^\d+\s*·\s*/,""), cat:c.label, photos:photos });
    });
  });
  Object.keys(photosMap||{}).forEach(function(catKey) {
    if (coveredKeys.has(catKey)) return;
    var photos = ((photosMap||{})[catKey]||[]).filter(function(p){ return p&&p.url; });
    if (!photos.length) return;
    sections.push({ tab:tabLabel, section:buildPhotoLabel(catKey), cat:buildPhotoLabel(catKey), photos:photos });
  });
  return sections;
}

function generateAsBuilt(data, logoSrc, sheetLabel) {
  var ref     = data.meta.ref    || "—";
  var client  = data.meta.client || "—";
  var adresse = data.meta.adresse|| "—";
  var date    = data.meta.dateControle || new Date().toISOString().slice(0,10);
  var pm      = data.meta.pm     || "—";
  var sheetName = sheetLabel || "";

// ── Helper partagé : collecte toutes les photos (clés statiques + dynamiques)
  function collectSectionPhotos(photosMap, sectionDefs, tabLabel) {
    var sections = [];
    sectionDefs.forEach(function(s) {
      var cats = s.photoCats || [];
      cats.forEach(function(c) {
        var photos = (photosMap[c.key]||[]).filter(function(p){ return p && p.url; });
        if (photos.length > 0) sections.push({ tab:tabLabel, section:s.label.replace(/^\d+\s*·\s*/,""), cat:c.label, photos:photos });
      });
    });
    return sections;
  }

  var dcSections = collectAllSectionPhotos(data.dc.photos||{}, DC_SECTIONS, "DC");
  var acSections = collectAllSectionPhotos(data.ac.photos||{}, AC_SECTIONS, "AC");

  // String photos — skip empty
  var stringPhotos = [];
  for (var i=0; i<20; i++) {
    var sp = (data.dc.photos||{})["string_ph_"+i];
    if (sp && sp.length > 0) stringPhotos = stringPhotos.concat(sp.filter(function(p){ return p&&p.url; }).map(function(p){ return Object.assign({},p,{stringIdx:i}); }));
  }
  if (stringPhotos.length > 0) dcSections.push({ tab:"DC", section:"Strings", cat:"Strings", photos:stringPhotos });

  var generalPhotos = (data.photosGenerales||[]).filter(function(p){ return p&&p.url; });

  // Admin docs — skip empty sections
  var adminSections = [];
  var adminSecDefs = [
    { key:"rgie",      label:"Rapport de conformité RGIE" },
    { key:"asbuilt",   label:"Dossiers AS-Built" },
    { key:"grd",       label:"Documents GRD" },
    { key:"stabilite", label:"Rapport de stabilité" },
    { key:"fiches",    label:"Fiches techniques" },
  ];
  ((data.admin&&data.admin.customSections)||[]).forEach(function(cs){ adminSecDefs.push({ key:cs.key, label:cs.label }); });
  adminSecDefs.forEach(function(def) {
    var sec = ((data.admin||{}).sections||{})[def.key];
    if (sec && sec.docs && sec.docs.length > 0) adminSections.push({ label:def.label, docs:sec.docs, note:sec.note||"" });

  // TOC
  var tocItems = [];
  if (dcSections.length > 0) tocItems.push({ title:"DC — Couverture & Câblage", anchor:"sec-dc" });
  if (acSections.length > 0) tocItems.push({ title:"AC — Installation électrique", anchor:"sec-ac" });
  if (generalPhotos.length > 0) tocItems.push({ title:"Photos générales du chantier", anchor:"sec-general" });
  if (adminSections.length > 0) tocItems.push({ title:"Documents administratifs", anchor:"sec-admin" });

  // ── Photo grid : 2 colonnes, photos pleine largeur, non coupées ──
  function photoGrid(photos, cols) {
    cols = cols || 2;
    return '<div style="display:grid;grid-template-columns:repeat('+cols+',1fr);gap:16px;margin-top:12px">'
      + photos.map(function(p){
          var caption = [p.uploadedBy?"👤 "+p.uploadedBy:"", p.addedAt?new Date(p.addedAt).toLocaleDateString("fr-BE"):""].filter(Boolean).join(" · ");
          return '<div style="page-break-inside:avoid;break-inside:avoid">'
            + '<img src="'+p.url+'" style="width:100%;height:auto;max-height:280px;object-fit:contain;background:#f4f4f0;border-radius:6px;border:1px solid #ddd;display:block" />'
            + (caption ? '<div style="font-size:10px;color:#666;margin-top:4px;text-align:center">'+caption+'</div>' : '')
            + '</div>';
        }).join("")
      + '</div>';
  }

  function sectionHTML(sections) {
    if (!sections.length) return '<p style="color:#999;font-style:italic">Aucune photo dans cet onglet.</p>';
    return sections.map(function(s){
      return '<div style="page-break-inside:avoid;break-inside:avoid;margin-bottom:28px">'
        + '<h3 style="font-size:13px;font-weight:700;color:#1B6B3A;margin:0 0 6px;padding-bottom:4px;border-bottom:1px solid #d4ead9">'
        + s.tab+' — '+s.section+' <span style="font-weight:400;color:#888;font-size:11px">('+s.photos.length+' photo'+( s.photos.length>1?'s':'')+')</span></h3>'
        + photoGrid(s.photos, s.photos.length === 1 ? 1 : 2)
        + '</div>';
    }).join("");
  }

  function adminHTML() {
    return adminSections.map(function(s){
      var docsHtml = s.docs.map(function(d){
        var ext = (d.name||"").split(".").pop().toLowerCase();
        var isImg = ["jpg","jpeg","png","gif","webp"].indexOf(ext) >= 0;
        var isPdf = ext === "pdf";
        return '<div style="page-break-inside:avoid;break-inside:avoid;margin-bottom:12px;border:1px solid #e8e8e4;border-radius:8px;overflow:hidden">'
          + (isImg ? '<img src="'+d.url+'" style="width:100%;height:auto;max-height:400px;object-fit:contain;background:#f4f4f0;display:block" />' : "")
          + (isPdf ? '<iframe src="'+d.url+'" style="width:100%;height:500px;border:none;display:block"></iframe>' : "")
          + (!isImg&&!isPdf ? '<div style="padding:20px;text-align:center;color:#888;font-size:13px">📎 '+d.name+'</div>' : "")
          + '<div style="padding:6px 10px;background:#f8f8f6;font-size:10px;color:#555">'
            + '<strong>'+d.name+'</strong>'
            + (d.uploadedBy?" · 👤 "+d.uploadedBy:"")
            + (d.note?' · <em>'+d.note+'</em>':"")
          + '</div></div>';
      }).join("");
      return '<div style="page-break-inside:avoid;break-inside:avoid;margin-bottom:24px">'
        + '<h3 style="font-size:13px;font-weight:700;color:#8e44ad;margin:0 0 8px;padding-bottom:4px;border-bottom:1px solid #e0d5f5">'+s.label+'</h3>'
        + (s.note?'<p style="font-size:11px;color:#555;font-style:italic;margin-bottom:8px">'+s.note+'</p>':"")
        + docsHtml
        + '</div>';
    }).join("");
  }

  var html = '<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8">'
    + '<title>AS-Built — '+ref+(sheetName?' — '+sheetName:'')+'</title>'
    + '<style>'
    + 'body{margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;color:#1a1a1a;background:#fff;font-size:13px}'
    + '.page{width:210mm;min-height:290mm;padding:16mm 18mm;box-sizing:border-box}'
    + '.cover{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;page-break-after:always}'
    + '.section-page{page-break-before:always}'
    + '.section-title{font-size:15px;font-weight:700;color:#fff;background:#1B6B3A;padding:9px 14px;border-radius:6px;margin-bottom:16px}'
    + '@media print{.no-print{display:none!important}.page{page-break-after:always}@page{size:A4;margin:10mm}}'
    + '</style></head><body>'

    // Cover page
    + '<div class="page cover">'
    + (logoSrc ? '<img src="'+logoSrc+'" style="height:70px;object-fit:contain;margin-bottom:28px" />' : '<div style="height:70px;margin-bottom:28px"></div>')
    + '<div style="font-size:26px;font-weight:700;color:#1B6B3A;margin-bottom:6px">Dossier AS-Built</div>'
    + '<div style="font-size:20px;font-weight:600;color:#333;margin-bottom:4px">'+ref+'</div>'
    + (sheetName ? '<div style="font-size:14px;color:#666;margin-bottom:28px">'+sheetName+'</div>'
                 : '<div style="margin-bottom:28px"></div>')
    + '<div style="border:1px solid #d4ead9;border-radius:10px;padding:20px 32px;background:#f0f7f2;text-align:left;min-width:300px">'
    + '<table style="border-collapse:collapse;width:100%">'
    + '<tr><td style="padding:5px 12px 5px 0;font-size:11px;color:#666;font-weight:600;white-space:nowrap">Client</td><td style="padding:5px 0;font-size:13px;font-weight:700">'+client+'</td></tr>'
    + '<tr><td style="padding:5px 12px 5px 0;font-size:11px;color:#666;font-weight:600">Adresse</td><td style="padding:5px 0;font-size:12px">'+adresse+'</td></tr>'
    + '<tr><td style="padding:5px 12px 5px 0;font-size:11px;color:#666;font-weight:600">Date</td><td style="padding:5px 0;font-size:12px">'+date+'</td></tr>'
    + '<tr><td style="padding:5px 12px 5px 0;font-size:11px;color:#666;font-weight:600">Project Manager</td><td style="padding:5px 0;font-size:12px">'+pm+'</td></tr>'
    + '</table></div>'
    + '<div style="margin-top:32px;font-size:10px;color:#bbb">Généré le '+new Date().toLocaleDateString("fr-BE")+'</div>'
    + '</div>'

    // TOC
    + (tocItems.length > 0
      ? '<div class="page" style="page-break-after:always">'
        + '<h2 style="font-size:18px;font-weight:700;color:#1B6B3A;margin-bottom:20px;padding-bottom:8px;border-bottom:2px solid #d4ead9">Table des matières</h2>'
        + '<ol style="padding-left:18px;line-height:2.4;font-size:14px">'
        + tocItems.map(function(t){ return '<li><a href="#'+t.anchor+'" style="color:#1B6B3A;text-decoration:none">'+t.title+'</a></li>'; }).join("")
        + '</ol></div>'
      : "")

    // DC
    + (dcSections.length > 0
      ? '<div class="page section-page" id="sec-dc">'
        + '<div class="section-title">🟦 DC — Couverture &amp; Câblage</div>'
        + sectionHTML(dcSections)+'</div>'
      : "")

    // AC
    + (acSections.length > 0
      ? '<div class="page section-page" id="sec-ac">'
        + '<div class="section-title">🟥 AC — Installation électrique</div>'
        + sectionHTML(acSections)+'</div>'
      : "")

    // Photos générales
    + (generalPhotos.length > 0
      ? '<div class="page section-page" id="sec-general">'
        + '<div class="section-title">🏗️ Photos générales</div>'
        + photoGrid(generalPhotos, 2)+'</div>'
      : "")

    // Admin docs
    + (adminSections.length > 0
      ? '<div class="page section-page" id="sec-admin">'
        + '<div class="section-title">📂 Documents administratifs</div>'
        + adminHTML()+'</div>'
      : "")

    + '<div class="no-print" style="position:fixed;bottom:20px;right:20px;display:flex;gap:10px;z-index:9999">'
    + '<button onclick="window.print()" style="background:#1B6B3A;color:#fff;border:none;border-radius:8px;padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,0.2)">🖨️ Enregistrer / Imprimer PDF</button>'
    + '<button onclick="window.close()" style="background:#888;color:#fff;border:none;border-radius:8px;padding:12px 16px;font-size:14px;cursor:pointer">✕</button>'
    + '</div>'
    + '</body></html>';

  var win = window.open("", "_blank");
  if (!win) { alert("Veuillez autoriser les popups pour générer le PDF AS-Built."); return; }
  win.document.write(html);
  win.document.close();
}


// ── AsBuiltViewer : dossier AS-Built interactif (mode client ?client=1) ──────
function AsBuiltViewer({ wgeUser }) {
  var params = new URLSearchParams(window.location.search);
  var ref     = params.get("ref") || "";
  var sheetId = params.get("sheet") || null;

  var params = new URLSearchParams(window.location.search);
  var isAsBuiltMode = params.get("asbuilt") === "1";
  var forceClientPreview = params.get("preview") === "client";
  // isViewerWGE : vrai si ?asbuilt=1 OU si session WGE en localStorage
  // Double vérification pour couvrir tous les cas (URL + session)
  var isViewerWGE = (function() {
    if (forceClientPreview) return false; // ?preview=client → toujours vue client
    if (isAsBuiltMode) return true;       // ?asbuilt=1 → toujours WGE (jamais dans les liens clients)
    try {
      var u = JSON.parse(localStorage.getItem("wge_user") || "{}");
      return !!(u && (u.type === "wge" ||
        (u.email && (u.email.endsWith("@we-green.be") || u.email.endsWith("@we-green.fr")))));
    } catch(e) { return false; }
  })();

  var [sheets, setSheets]       = useState([]);
  var [orderedItems, setOrdered] = useState([]);
  var [activeId, setActiveId]   = useState(null);
  var [data, setData]           = useState(null);
  var [loading, setLoading]     = useState(true);
  var [error, setError]         = useState("");
  var [lightbox, setLightbox]   = useState(null);
  var [hiddenPhotos, setHiddenPhotos] = useState({});
  var [techInfo, setTechInfo]         = useState(null); // infos techniques par feuille
  var [techEditing, setTechEditing]   = useState(false);

  var TECH_EMPTY = {
    panels:     { count:"", power:"", type:"", total_kwp:"" },
    panels2:    { active:false, count:"", power:"", type:"", total_kwp:"" },
    inverters:  [{ brand:"", model:"", count:"1", serial:"" }],
    battery:    { installed:false, brand:"", model:"", capacity:"" },
    protections:{ disjAC:"", disjPV:"", parafoudre:false, differentiel:"", miseTerre:"" },
    compteur:   { serie:"", ean:"", type:"" },
    notes:""
  };

  // ── Chargement initial : liste des feuilles + ordre des sections ──────────
  useEffect(function() {
    if (!ref) { setLoading(false); setError("Référence chantier manquante dans l'URL."); return; }
    Promise.all([
      supaLoadList(ref),
      supaLoadOrder(ref)
    ]).then(function(results) {
      var rows      = results[0] || [];
      var orderRow  = results[1];
      setSheets(rows);

      // Appliquer l'ordre avec les sections
      if (orderRow && orderRow.data && orderRow.data.order && orderRow.data.order.length > 0) {
        var order = orderRow.data.order;
        var result = [];
        order.forEach(function(item) {
          if (item.type === "section") { result.push(item); }
          else {
            var s = rows.find(function(sh){ return sh.id === item.id; });
            if (s) result.push({ type:"sheet", data:s });
          }
        });
        rows.forEach(function(s) {
          var inOrder = order.some(function(o){ return o.type==="sheet" && o.id===s.id; });
          if (!inOrder) result.push({ type:"sheet", data:s });
        });
        setOrdered(result);
      } else {
        setOrdered(applySortOrder(rows, ref));
      }

      var defaultId = sheetId || (rows[0] && rows[0].id) || null;
      if (defaultId) { setActiveId(defaultId); }
      else           { setLoading(false); }
    }).catch(function() {
      setError("Impossible de charger les feuilles.");
      setLoading(false);
    });
  }, []);

  // ── Chargement d'une feuille spécifique ───────────────────────────────────
  useEffect(function() {
    if (!activeId) return;
    setLoading(true);
    Promise.all([
      supaLoadById(activeId),
      supaLoadOrder(ref)
    ]).then(function(results) {
      var row      = results[0];
      var orderRow = results[1];
      if (row && row.data) { setData(row.data); }
      else                 { setError("Feuille introuvable."); }
      // Photos masquées + infos techniques
      var d = (orderRow && orderRow.data) || {};
      setHiddenPhotos((d.hiddenPhotos && d.hiddenPhotos[activeId]) || {});
      setTechInfo((d.techInfo    && d.techInfo[activeId])    || null);
      setTechEditing(false);
      setLoading(false);
    }).catch(function() {
      setError("Erreur de chargement.");
      setLoading(false);
    });
  }, [activeId]);

  // ── Sélection photos : inclure/exclure de la vue client ─────────────────
  function onTogglePhoto(url) {
    setHiddenPhotos(function(prev) {
      var next = Object.assign({}, prev);
      if (next[url]) delete next[url]; else next[url] = true;
      supaLoadOrder(ref).then(function(row) {
        var d = (row&&row.data)||{};
        var newHidden = Object.assign({}, d.hiddenPhotos||{}, { [activeId||"all"]: next });
        var newData = Object.assign({}, d, { hiddenPhotos: newHidden });
        if (row && row.id) {
          fetch(SUPA_URL+"/rest/v1/feuilles_controle?id=eq."+row.id, {
            method:"PATCH",
            headers:{"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY,"Content-Type":"application/json"},
            body:JSON.stringify({data:newData, updated_at:new Date().toISOString()})
          });
        } else {
          supaUpsertOrder(ref, d.order||[]);
        }
      });
      return next;
    });
  }

  function hasTechInfo(t) {
    if (!t) return false;
    return !!(t.panels&&(t.panels.count||t.panels.power||t.panels.type)) ||
           !!(t.panels2&&t.panels2.active&&(t.panels2.count||t.panels2.type)) ||
           !!(t.inverters&&t.inverters[0]&&(t.inverters[0].brand||t.inverters[0].model)) ||
           !!(t.battery&&t.battery.installed) ||
           !!(t.protections&&(t.protections.disjAC||t.protections.disjPV||t.protections.parafoudre||t.protections.differentiel||t.protections.miseTerre)) ||
           !!(t.compteur&&(t.compteur.serie||t.compteur.ean||t.compteur.type)) ||
           !!(t.notes);
  }

  function saveTechInfo(newTech) {
    setTechInfo(newTech);
    supaLoadOrder(ref).then(function(row) {
      var prev = (row&&row.data)||{};
      var newData = Object.assign({}, prev, { techInfo: Object.assign({}, prev.techInfo||{}, { [activeId||"all"]: newTech }) });
      if (row && row.id) {
        fetch(SUPA_URL+"/rest/v1/feuilles_controle?id=eq."+row.id, {
          method:"PATCH",
          headers:{"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY,"Content-Type":"application/json"},
          body:JSON.stringify({data:newData,updated_at:new Date().toISOString()})
        });
      } else {
        supaUpsertOrder(ref, prev.order||[]);
      }
    });
  }

  function TechInfoPanel() {
    var t   = techInfo || TECH_EMPTY;
    var inv = (t.inverters && t.inverters[0]) ? t.inverters[0] : { brand:"", model:"", count:"1", serial:"" };
    var pro = t.protections || {};
    var cpt = t.compteur    || {};

    if (!isViewerWGE && !hasTechInfo(techInfo)) return null;

    // ── Helper champ éditable ──────────────────────────────────────────────
    function Field({ label, path, placeholder }) {
      var keys = path.split(".");
      var val = t[keys[0]] !== undefined ? (keys[1] ? (t[keys[0]]&&t[keys[0]][keys[1]])||"" : t[keys[0]]||"") : "";
      return (
        <div>
          <label style={{ fontSize:10, color:"#555", display:"block", marginBottom:2, fontWeight:600 }}>{label}</label>
          <input type="text" value={val} placeholder={placeholder||""}
            onChange={function(e){
              var v = e.target.value;
              var newT = JSON.parse(JSON.stringify(t||TECH_EMPTY));
              if (keys[1]) { if(!newT[keys[0]]) newT[keys[0]]={};  newT[keys[0]][keys[1]] = v; }
              else          { newT[keys[0]] = v; }
              saveTechInfo(newT);
            }}
            style={{ width:"100%", padding:"5px 8px", border:"1px solid #d4ead9", borderRadius:6, fontSize:12, boxSizing:"border-box" }} />
        </div>
      );
    }

    // ── Vue CLIENT : uniquement si remplie ────────────────────────────────
    if (!isViewerWGE) {
      return (
        <div style={{ background:"#f0f7f2", border:"1px solid #d4ead9", borderRadius:10, padding:"16px 20px", marginBottom:20 }}>
          <div style={{ fontWeight:700, fontSize:14, color:"#1B6B3A", marginBottom:12 }}>⚡ Informations techniques de l'installation</div>
          <table style={{ borderCollapse:"collapse", width:"100%", fontSize:13 }}>
            {t.panels&&t.panels.count&&(
              <tr><td style={{ padding:"4px 14px 4px 0", color:"#555", fontWeight:600, whiteSpace:"nowrap" }}>Panneaux</td>
              <td>{t.panels.count} panneaux{t.panels.power?" × "+t.panels.power+" Wc":""} {t.panels.type?t.panels.type:""} {t.panels.total_kwp?"→ "+t.panels.total_kwp+" kWc":""}</td></tr>
            )}
            {t.panels2&&t.panels2.active&&t.panels2.count&&(
              <tr><td style={{ padding:"4px 14px 4px 0", color:"#555", fontWeight:600, whiteSpace:"nowrap" }}>Panneaux 2</td>
              <td>{t.panels2.count} panneaux{t.panels2.power?" × "+t.panels2.power+" Wc":""} {t.panels2.type?t.panels2.type:""} {t.panels2.total_kwp?"→ "+t.panels2.total_kwp+" kWc":""}</td></tr>
            )}
            {t.inverters&&t.inverters.map(function(inv, ii) {
              if (!inv.brand&&!inv.model) return null;
              return (
                <tr key={ii}><td style={{ padding:"4px 14px 4px 0", color:"#555", fontWeight:600, whiteSpace:"nowrap" }}>
                  {t.inverters.length>1?"Onduleur "+(ii+1):"Onduleur"}
                </td>
                <td>{inv.count&&inv.count>"1"?inv.count+"× ":""}{inv.brand} {inv.model} {inv.serial?"(S/N: "+inv.serial+")":""}</td></tr>
              );
            })}
            {t.battery&&t.battery.installed&&(
              <tr><td style={{ padding:"4px 14px 4px 0", color:"#555", fontWeight:600, whiteSpace:"nowrap" }}>Batterie</td>
              <td>{t.battery.brand} {t.battery.model} {t.battery.capacity?"— "+t.battery.capacity:""}</td></tr>
            )}
            {(pro.disjAC||pro.disjPV||pro.differentiel||pro.miseTerre)&&(
              <tr><td style={{ padding:"4px 14px 4px 0", color:"#555", fontWeight:600, whiteSpace:"nowrap", verticalAlign:"top" }}>Protections</td>
              <td>{[pro.disjAC&&"Disj. AC: "+pro.disjAC+"A", pro.disjPV&&"Disj. PV: "+pro.disjPV+"A", pro.parafoudre&&"Parafoudre installé", pro.differentiel&&"Différentiel: "+pro.differentiel, pro.miseTerre&&"Mise à la terre: "+pro.miseTerre].filter(Boolean).join(" · ")}</td></tr>
            )}
            {(cpt.serie||cpt.ean||cpt.type)&&(
              <tr><td style={{ padding:"4px 14px 4px 0", color:"#555", fontWeight:600, whiteSpace:"nowrap" }}>Compteur</td>
              <td>{[cpt.type, cpt.serie&&"N°: "+cpt.serie, cpt.ean&&"EAN: "+cpt.ean].filter(Boolean).join(" · ")}</td></tr>
            )}
            {t.notes&&(
              <tr><td style={{ padding:"4px 14px 4px 0", color:"#555", fontWeight:600 }}>Remarques</td>
              <td style={{ fontStyle:"italic" }}>{t.notes}</td></tr>
            )}
          </table>
        </div>
      );
    }

    // ── Vue WGE : éditable ────────────────────────────────────────────────
    return (
      <div style={{ border:"2px dashed #a8d5b5", borderRadius:10, padding:"14px 16px", marginBottom:20, background:"#fafff8" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:6 }}>
          <div>
            <span style={{ fontWeight:700, fontSize:13, color:"#1B6B3A" }}>⚡ Informations techniques</span>
            <span style={{ marginLeft:8, fontSize:11, color:"#999", fontWeight:400 }}>— champs vides = non affichés côté client</span>
          </div>
          <div style={{ display:"flex", gap:8 }}>
            {!techEditing && (
              <button onClick={function(){
                var fref = (data&&data.meta&&data.meta.ref)||ref;
                fetch(BRIEFING_URL+"/rest/v1/feuilles_chantier?ref=eq."+encodeURIComponent(fref)+"&select=data&limit=1",
                  {headers:{"apikey":BRIEFING_KEY,"Authorization":"Bearer "+BRIEFING_KEY}})
                .then(function(r){ return r.json(); })
                .then(function(rows) {
                  if (!rows||!rows[0]||!rows[0].data) { alert("Aucune fiche chantier trouvée pour ce chantier (réf: "+fref+")."); return; }
                  var fc = rows[0].data;
                  // Nouvelle structure : fc.sites[0].pvInstallations[0].tech + fc.sites[0].electrical
                  var site  = fc.sites && fc.sites[0];
                  var inst  = site && site.pvInstallations && site.pvInstallations[0];
                  var tech  = inst && inst.tech;
                  var elec  = (site && site.electrical) || {};
                  // Fallback ancienne structure (fc.installations[0].tech)
                  if (!tech && fc.installations && fc.installations[0]) {
                    tech = fc.installations[0].tech;
                    elec = fc.installations[0].tech || {};
                  }
                  if (!tech) { alert("La fiche chantier ne contient pas de données techniques (réf: "+fref+")."); return; }
                  var imported = JSON.parse(JSON.stringify(t||TECH_EMPTY));

                  // ── Panneaux ──────────────────────────────────────────────
                  if (tech.panneaux) {
                    if (tech.panneaux.type) imported.panels.type  = tech.panneaux.type;
                    if (tech.panneaux.nbr)  imported.panels.count = String(tech.panneaux.nbr);
                    if (tech.panneaux.kWc)  imported.panels.total_kwp = String(tech.panneaux.kWc);
                    if (tech.panneaux.nbr && tech.panneaux.kWc && parseFloat(tech.panneaux.nbr) > 0) {
                      var wc = Math.round(parseFloat(tech.panneaux.kWc)*1000 / parseFloat(tech.panneaux.nbr));
                      if (wc > 0) imported.panels.power = String(wc);
                    }
                  }
                  // ── Panneaux 2 ────────────────────────────────────────────
                  if (tech.panneaux2 && tech.panneaux2.active && (tech.panneaux2.type || tech.panneaux2.nbr)) {
                    imported.panels2 = {
                      active: true,
                      type:      tech.panneaux2.type || "",
                      count:     tech.panneaux2.nbr  ? String(tech.panneaux2.nbr) : "",
                      total_kwp: tech.panneaux2.kWc  ? String(tech.panneaux2.kWc) : "",
                      power: (tech.panneaux2.nbr && tech.panneaux2.kWc && parseFloat(tech.panneaux2.nbr) > 0)
                        ? String(Math.round(parseFloat(tech.panneaux2.kWc)*1000/parseFloat(tech.panneaux2.nbr)))
                        : ""
                    };
                  }
                  // ── Onduleurs (tous types, extraction marque/modèle) ──────
                  if (tech.onduleurs && tech.onduleurs.length > 0) {
                    imported.inverters = tech.onduleurs.map(function(o) {
                      var typeStr = o.type || "";
                      // Extraire la marque : tout ce qui précède le premier " - "
                      var dashIdx = typeStr.indexOf(" - ");
                      var brand = dashIdx > 0 ? typeStr.substring(0, dashIdx).trim() : "";
                      var model = dashIdx > 0 ? typeStr.substring(dashIdx + 3).trim() : typeStr;
                      // Quantité : kva peut contenir des infos supplémentaires
                      var qty = o.qty || o.count || "1";
                      return { brand: brand, model: model, count: String(qty), serial: "" };
                    });
                  }
                  // ── Batterie ──────────────────────────────────────────────
                  if (tech.batterie && tech.batterie.inclus === "OUI") {
                    imported.battery = {
                      installed: true, brand:"",
                      model: tech.batterie.type || "",
                      capacity: tech.batterie.kwh ? tech.batterie.kwh+" kWh" : ""
                    };

                  // ── Protections (niveau site electrical) ──────────────────
                  if (elec.amperageDisj) imported.protections.disjAC = String(elec.amperageDisj);
                  // ── Compteur (niveau site electrical) ─────────────────────
                  if (elec.compteur) {
                    if (elec.compteur.serie) imported.compteur.serie = String(elec.compteur.serie);

                  }

                  saveTechInfo(imported);
                  setTechEditing(false); // fermer le formulaire — données sauvegardées
                  alert("✅ Informations importées et sauvegardées.\nCliquez ✏️ Modifier pour ajuster si nécessaire.");
                }).catch(function(e){ alert("Impossible d'accéder à la fiche chantier ("+e+")."); });

  // ── PdfPages : rendu page par page via PDF.js ──────────────────────────────
  function PdfPages({ url, name }) {
    var [pages, setPages]     = useState([]);
    var [loadingPdf, setLPdf] = useState(true);
    var [pdfError, setPdfErr] = useState(false);
    useEffect(function() {
      if (!url) return;
      if (window.pdfjsLib) {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc =
          "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        window.pdfjsLib.getDocument({ url: url, withCredentials: false }).promise
          .then(function(pdf) {
            var tasks = [];
            for (var i = 1; i <= pdf.numPages; i++) {
              tasks.push((function(pageNum) {
                return pdf.getPage(pageNum).then(function(page) {
                  var vp = page.getViewport({ scale: 1.8 });
                  var canvas = document.createElement("canvas");
                  canvas.width = vp.width; canvas.height = vp.height;
                  return page.render({ canvasContext: canvas.getContext("2d"), viewport: vp }).promise
                    .then(function() { return canvas.toDataURL("image/jpeg", 0.88); });
                });
              })(i));
            }
            return Promise.all(tasks);
          })
          .then(function(dataUrls) { setPages(dataUrls); setLPdf(false); })
          .catch(function() { setPdfErr(true); setLPdf(false); });
      } else { setPdfErr(true); setLPdf(false); }
    }, [url]);
    return (
      <div>
        <div className="ab-iframe-wrap">
          <iframe src={url} style={{ width:"100%", height:420, border:"none", display:"block" }} title={name} />
        </div>
        <div className="ab-pdf-print-pages">
          {loadingPdf && <div style={{ padding:12, color:"#888", fontSize:12 }}>⏳ Rendu PDF…</div>}
          {pdfError && <div style={{ padding:12, background:"#fff8e1", border:"1px solid #f39c12", borderRadius:6, fontSize:12 }}>
            ⚠️ <a href={url} target="_blank" style={{ color:"#1B6B3A" }}>Ouvrir le PDF</a>
          </div>}
          {pages.map(function(src, i) {
            return (
              <div key={i} style={{ marginBottom:8, breakInside:"avoid", pageBreakInside:"avoid" }}>
                <img src={src} style={{ width:"100%", display:"block", border:"1px solid #e0e0d8", borderRadius:4 }} />
                {pages.length > 1 && <div style={{ fontSize:9, color:"#aaa", textAlign:"right", marginTop:2 }}>Page {i+1}/{pages.length}</div>}
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  var adminSecDefs = [

  return (
